/* ---------------- crop editor ----------------
   A React port of the standalone IMG/EXPORT tool. Lets the designer draw / move / resize a
   crop box over the source image, locked to a chosen aspect within the card band (4:5 .. 2:3),
   so they see exactly what is kept vs trimmed. Stores a normalised crop { ratio, x, y, w, h }.
   The overlay canvas only paints the dim mask + handles — it never reads image pixels, so
   remote (cross-origin) images are fine (no canvas taint, nothing is re-hosted). */
const CROP_RATIOS = [ { r: 4 / 5, label: '4:5' }, { r: 3 / 4, label: '3:4' }, { r: 2 / 3, label: '2:3' } ];
function fitRect(W, H, ratio) { let w = W, h = w / ratio; if (h > H) { h = H; w = h * ratio; } return { x: (W - w) / 2, y: (H - h) / 2, w, h }; }
function CropEditor({ src, initial, onApply, onCancel }) {
  const stageRef = useRef(null), imgRef = useRef(null), canvasRef = useRef(null);
  const interaction = useRef(null);
  const sel = useRef({ x: 0, y: 0, w: 0, h: 0 });
  const disp = useRef({ w: 0, h: 0 });
  const [ratio, setRatio] = useState(clamp((initial && initial.ratio) || CARD_RATIO_DEFAULT, CARD_RATIO_MIN, CARD_RATIO_MAX));
  const [ready, setReady] = useState(false);
  const [failed, setFailed] = useState(false);
  const HANDLE = 14, MIN = 24;

  const draw = () => {
    const cv = canvasRef.current; if (!cv) return;
    const ctx = cv.getContext('2d'); const W = cv.width, H = cv.height; const s = sel.current;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(20,16,12,0.62)'; ctx.fillRect(0, 0, W, H);
    ctx.clearRect(s.x, s.y, s.w, s.h);
    ctx.strokeStyle = '#C5A23C'; ctx.lineWidth = 1.5; ctx.strokeRect(s.x + 0.5, s.y + 0.5, s.w - 1, s.h - 1);
    ctx.strokeStyle = 'rgba(197,162,60,0.35)'; ctx.lineWidth = 0.75;
    for (let i = 1; i < 3; i++) { const x = s.x + (s.w / 3) * i, y = s.y + (s.h / 3) * i; ctx.beginPath(); ctx.moveTo(x, s.y); ctx.lineTo(x, s.y + s.h); ctx.stroke(); ctx.beginPath(); ctx.moveTo(s.x, y); ctx.lineTo(s.x + s.w, y); ctx.stroke(); }
    ctx.fillStyle = '#C5A23C'; const hs = 7;
    [[s.x, s.y], [s.x + s.w - hs, s.y], [s.x, s.y + s.h - hs], [s.x + s.w - hs, s.y + s.h - hs],
     [s.x + s.w / 2 - hs / 2, s.y], [s.x + s.w / 2 - hs / 2, s.y + s.h - hs], [s.x, s.y + s.h / 2 - hs / 2], [s.x + s.w - hs, s.y + s.h / 2 - hs / 2]]
      .forEach(([cx, cy]) => ctx.fillRect(cx, cy, hs, hs));
  };

  const layout = () => {
    const img = imgRef.current, stage = stageRef.current;
    if (!img || !stage || !img.naturalWidth) return;
    const pad = 16, sw = stage.clientWidth - pad * 2, sh = stage.clientHeight - pad * 2;
    const scale = Math.min(sw / img.naturalWidth, sh / img.naturalHeight, 1);
    const w = Math.max(1, Math.round(img.naturalWidth * scale)), h = Math.max(1, Math.round(img.naturalHeight * scale));
    disp.current = { w, h };
    if (initial && initial.w) sel.current = { x: initial.x * w, y: initial.y * h, w: initial.w * w, h: initial.h * h };
    else sel.current = fitRect(w, h, ratio);
    setReady(true); requestAnimationFrame(draw);
  };
  useEffect(() => { const img = imgRef.current; if (img && img.complete && img.naturalWidth) layout(); }, []);
  // changing the target ratio re-fits the box around its current centre, clamped to the image
  const applyRatio = (nr) => {
    setRatio(nr); const d = disp.current; if (!d.w) return;
    const cx = sel.current.x + sel.current.w / 2, cy = sel.current.y + sel.current.h / 2;
    const f = fitRect(d.w, d.h, nr); let w = Math.min(sel.current.w, f.w), h = w / nr; if (h > d.h) { h = d.h; w = h * nr; }
    sel.current = clampSel({ x: cx - w / 2, y: cy - h / 2, w, h }, nr); draw();   // pass nr — `ratio` state is stale until re-render
  };
  // r defaults to the current ratio; callers mid-ratio-change pass the new ratio explicitly
  const clampSel = (s, r = ratio) => {
    const d = disp.current;
    if (s.w > d.w) { s.w = d.w; s.h = s.w / r; }
    if (s.h > d.h) { s.h = d.h; s.w = s.h * r; }
    s.x = clamp(s.x, 0, d.w - s.w); s.y = clamp(s.y, 0, d.h - s.h);
    return s;
  };
  const rel = (e) => { const r = canvasRef.current.getBoundingClientRect(); return { x: (e.clientX - r.left) * (canvasRef.current.width / r.width), y: (e.clientY - r.top) * (canvasRef.current.height / r.height) }; };
  const zone = (x, y) => {
    const s = sel.current, H2 = HANDLE;
    const L = Math.abs(x - s.x) <= H2, R = Math.abs(x - (s.x + s.w)) <= H2, T = Math.abs(y - s.y) <= H2, B = Math.abs(y - (s.y + s.h)) <= H2;
    const inside = x > s.x && x < s.x + s.w && y > s.y && y < s.y + s.h;
    if (T && L) return 'tl'; if (T && R) return 'tr'; if (B && L) return 'bl'; if (B && R) return 'br';
    if (T) return 't'; if (B) return 'b'; if (L) return 'l'; if (R) return 'r';
    return inside ? 'move' : 'draw';
  };
  const onDown = (e) => {
    e.preventDefault(); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
    const p = rel(e), z = zone(p.x, p.y);
    interaction.current = { type: z === 'draw' ? 'draw' : z === 'move' ? 'move' : 'resize', edge: z, sx: p.x, sy: p.y, start: { ...sel.current }, ax: p.x, ay: p.y };
    if (z === 'draw') sel.current = { x: p.x, y: p.y, w: 0, h: 0 };
  };
  const onMove = (e) => {
    const it = interaction.current; if (!it) return; e.preventDefault();
    const p = rel(e), dx = p.x - it.sx, dy = p.y - it.sy;
    if (it.type === 'move') { sel.current = clampSel({ ...it.start, x: it.start.x + dx, y: it.start.y + dy }); }
    else if (it.type === 'draw') {
      let aw = Math.abs(p.x - it.ax), ah = Math.abs(p.y - it.ay), w, h;
      if (aw / Math.max(1, ah) > ratio) { w = aw; h = w / ratio; } else { h = ah; w = h * ratio; }
      sel.current = clampSel({ x: p.x >= it.ax ? it.ax : it.ax - w, y: p.y >= it.ay ? it.ay : it.ay - h, w, h });
    } else {
      const e0 = it.edge; let ns = { ...it.start };
      if (e0.includes('r')) ns.w = Math.max(MIN, it.start.w + dx);
      if (e0.includes('l')) { ns.w = Math.max(MIN, it.start.w - dx); ns.x = it.start.x + it.start.w - ns.w; }
      if (e0.includes('b')) ns.h = Math.max(MIN, it.start.h + dy);
      if (e0.includes('t')) { ns.h = Math.max(MIN, it.start.h - dy); ns.y = it.start.y + it.start.h - ns.h; }
      if (e0 === 't' || e0 === 'b') { ns.w = ns.h * ratio; ns.x = it.start.x + it.start.w / 2 - ns.w / 2; }
      else if (e0 === 'l' || e0 === 'r') { ns.h = ns.w / ratio; ns.y = it.start.y + it.start.h / 2 - ns.h / 2; }
      else { ns.h = ns.w / ratio; if (e0 === 'tl' || e0 === 'tr') ns.y = it.start.y + it.start.h - ns.h; }
      sel.current = clampSel(ns);
    }
    draw();
  };
  const onUp = () => { const it = interaction.current; if (it && it.type === 'draw' && sel.current.w < MIN) { sel.current = fitRect(disp.current.w, disp.current.h, ratio); draw(); } interaction.current = null; };
  const apply = () => { const d = disp.current; const s = sel.current; onApply({ ratio, x: clamp(s.x / d.w, 0, 1), y: clamp(s.y / d.h, 0, 1), w: clamp(s.w / d.w, 0, 1), h: clamp(s.h / d.h, 0, 1) }); };

  return (
    <div className="fixed inset-0 z-50 flex flex-col" style={{ background: 'rgba(20,16,12,0.92)' }}>
      <div className="flex items-center gap-3 px-4 py-3 flex-wrap" style={{ background: 'var(--card)', borderBottom: '1px solid rgba(43,37,32,0.15)' }}>
        <span className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>CROP</span>
        <span className="font-mono text-xs" style={{ opacity: 0.5 }}>Drag to draw · drag inside to move · handles to resize</span>
        <div className="flex gap-1.5 ml-auto items-center">
          <span className="font-mono text-xs mr-1" style={{ opacity: 0.6 }}>Shape</span>
          {CROP_RATIOS.map((o) => (
            <button key={o.label} onClick={() => applyRatio(o.r)} className="font-mono text-xs rounded-md px-2.5 py-1.5 border" style={{ borderColor: Math.abs(ratio - o.r) < 0.001 ? 'var(--brass)' : 'rgba(43,37,32,0.2)', background: Math.abs(ratio - o.r) < 0.001 ? 'var(--brass)' : '#fff', color: Math.abs(ratio - o.r) < 0.001 ? 'var(--card)' : 'var(--ink)' }}>{o.label}</button>
          ))}
          <button onClick={() => { sel.current = fitRect(disp.current.w, disp.current.h, ratio); draw(); }} className="ghost-button">Center</button>
          <button onClick={onCancel} className="ghost-button">Cancel</button>
          <button onClick={apply} disabled={!ready} className="tag-button disabled:opacity-40">Apply crop</button>
        </div>
      </div>
      <div ref={stageRef} className="flex-1 flex items-center justify-center relative overflow-hidden" style={{ minHeight: 0 }}>
        {failed ? (
          <p className="font-mono text-sm" style={{ color: '#FBF6EE', opacity: 0.7 }}>Could not load the image (check the URL / CORS).</p>
        ) : (
          <div className="relative" style={{ width: disp.current.w || 'auto', height: disp.current.h || 'auto', lineHeight: 0 }}>
            <img ref={imgRef} src={src} alt="" draggable={false} onLoad={layout} onError={() => setFailed(true)} style={{ display: 'block', width: disp.current.w ? disp.current.w + 'px' : 'auto', height: disp.current.h ? disp.current.h + 'px' : 'auto', userSelect: 'none' }} />
            <canvas ref={canvasRef} width={disp.current.w} height={disp.current.h} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', touchAction: 'none', cursor: 'crosshair' }} />
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- master library + quiz builder ----------------
   The "big database": add pieces with style tags, materials, main + accent colors,
   then filter the pool and drop a selected group into the active room. */
function LibraryManager({ facets, tags, library, activeQuiz, catMap, onAddPieceTo, onUpdateLibraryPiece, onDeleteLibraryPiece, onAddPiecesToRoom, onAddTag }) {
  const styleTags = facetTags(tags, 'style'), materialTags = facetTags(tags, 'material'), objectTags = facetTags(tags, 'object'), paletteTags = facetTags(tags, 'palette');
  const toggle = (arr, k) => (arr.includes(k) ? arr.filter((x) => x !== k) : [...arr, k]);
  // one-line facet summary (style · materials · objects) for a piece, used in both lists
  const tagLine = (p) => {
    const st = pieceFacet(p, catMap, 'style').map((t) => t.label);
    const mt = pieceFacet(p, catMap, 'material').map((t) => t.label);
    const ot = pieceFacet(p, catMap, 'object').map((t) => t.label);
    return [st.join(', ') || 'no style', mt.join(', '), ot.join(', ')].filter(Boolean).join(' · ');
  };

  // one unified add-a-piece form, with a destination toggle for the library and/or the active room
  const [name, setName] = useState(''); const [url, setUrl] = useState('');
  const [styles, setStyles] = useState([]); const [mats, setMats] = useState([]); const [objs, setObjs] = useState([]); const [palettes, setPalettes] = useState([]);
  const [colors, setColors] = useState([]); const [accentColors, setAccentColors] = useState([]);
  const [colorDraft, setColorDraft] = useState('#C9A227'); const [accentDraft, setAccentDraft] = useState('#46423C');
  const [newStyle, setNewStyle] = useState(''); const [newMat, setNewMat] = useState(''); const [newObj, setNewObj] = useState('');
  const [toRoom, setToRoom] = useState(false);   // also reference it from the active room?
  const [crop, setCrop] = useState(null);        // crop for the piece being added
  const [cropState, setCropState] = useState(null);   // open crop editor: { src, initial, apply }
  const valid = url.trim() && styles.length > 0;   // image + ≥1 style (every piece goes to the library)
  // a small fixed-ratio thumbnail that previews how a piece's crop will frame on the card
  const cropThumb = (src, c, w) => (
    <div className="relative overflow-hidden rounded-md flex-shrink-0" style={{ width: w + 'px', height: Math.round(w / clamp((c && c.ratio) || CARD_RATIO_DEFAULT, CARD_RATIO_MIN, CARD_RATIO_MAX)) + 'px', background: 'rgba(43,37,32,0.08)' }}>
      {src ? <CroppedImage src={src} crop={c} /> : <div className="w-full h-full flex items-center justify-center"><Icon name="image" size={16} color="rgba(43,37,32,0.4)" /></div>}
    </div>
  );
  // inline "add more tags": create a new vocabulary entry in the right facet and select it right away
  const mkId = (label) => `${slug(label)}-${Date.now().toString(36).slice(-4)}`;
  const addTagInline = (facet, label, setSel, reset) => {
    const l = label.trim(); if (!l) return; const id = mkId(l);
    onAddTag(facet === 'style'
      ? { id, facet, label: l, color: NEW_TAG_PALETTE[Math.floor(Math.random() * NEW_TAG_PALETTE.length)], desc: `${l} style.`, custom: true }
      : { id, facet, label: l, custom: true });
    setSel((s) => [...s, id]); reset('');
  };
  const submit = () => {
    if (!valid) return;
    onAddPieceTo({ base: { name: name.trim(), imageUrl: url.trim(), tags: [...styles, ...mats, ...objs, ...palettes], colors, accentColors, crop }, roomId: toRoom ? activeQuiz.id : null });
    setName(''); setUrl(''); setStyles([]); setMats([]); setObjs([]); setPalettes([]); setColors([]); setAccentColors([]); setCrop(null);
  };

  // filter + select for building a room. style/material filters are tri-state:
  // off -> include -> exclude. The mode maps a key to 'in' | 'ex'.
  const [fTagMode, setFTagMode] = useState({}); const [fColorMode, setFColorMode] = useState({}); const [fText, setFText] = useState('');
  const [sel, setSel] = useState([]);
  // editing a library piece in place
  const [editingId, setEditingId] = useState(null);
  const [editColorDraft, setEditColorDraft] = useState('#C9A227'); const [editAccentDraft, setEditAccentDraft] = useState('#46423C');
  const cycleMode = (setMap, key) => setMap((m) => { const nx = m[key] === 'in' ? 'ex' : m[key] === 'ex' ? undefined : 'in'; const n = { ...m }; if (nx) n[key] = nx; else delete n[key]; return n; });
  const keysWith = (map, v) => Object.keys(map).filter((k) => map[k] === v);
  // one unified tag filter across style / material / object (all live in piece.tags now)
  const tIn = keysWith(fTagMode, 'in'), tEx = keysWith(fTagMode, 'ex');
  const cIn = keysWith(fColorMode, 'in'), cEx = keysWith(fColorMode, 'ex');
  // distinct colors across the library (main + accent), normalised to upper-case hex, for the color filter
  const libColors = [...new Set(library.flatMap((p) => [...(p.colors || []), ...(p.accentColors || [])].map((c) => (c || '').toUpperCase())))].filter(Boolean).sort();
  const filtersActive = !!(fText || tIn.length || tEx.length || cIn.length || cEx.length);
  const filtered = library.filter((p) => {
    const ptags = p.tags || [];
    const cols = [...(p.colors || []), ...(p.accentColors || [])].map((c) => (c || '').toUpperCase());
    if (fText && !((p.name || '').toLowerCase().includes(fText.toLowerCase()))) return false;
    if (tIn.length && !tIn.some((k) => ptags.includes(k))) return false;   // must have one included tag
    if (tEx.some((k) => ptags.includes(k))) return false;                  // must have none excluded
    if (cIn.length && !cIn.some((k) => cols.includes(k))) return false;
    if (cEx.some((k) => cols.includes(k))) return false;
    return true;
  });
  const clearFilters = () => { setFText(''); setFTagMode({}); setFColorMode({}); };
  const toggleSel = (id) => setSel((s) => toggle(s, id));
  // building a room just adds references to the selected library pieces
  const addToRoom = () => { onAddPiecesToRoom(activeQuiz.id, sel); setSel([]); };

  const chip = (active, color, onClick, label, key) => (
    <button key={key} onClick={onClick} className="text-xs rounded-full px-3 py-1.5 border" style={{ borderColor: active ? (color || 'var(--brass)') : 'rgba(43,37,32,0.2)', background: active ? (color || 'var(--brass)') : '#fff', color: active ? (color ? readableText(color) : 'var(--card)') : 'var(--ink)' }}>{label}</button>
  );
  // tri-state filter chip: off (neutral) -> include (filled) -> exclude (rust, struck through)
  const triChip = (mode, color, onClick, label, key) => {
    const isIn = mode === 'in', isEx = mode === 'ex';
    return (
      <button key={key} onClick={onClick} title={isIn ? 'included — tap to exclude' : isEx ? 'excluded — tap to clear' : 'tap to include'} className="text-xs rounded-full px-3 py-1.5 border" style={{ borderColor: isIn ? (color || 'var(--brass)') : isEx ? 'var(--rust)' : 'rgba(43,37,32,0.2)', background: isIn ? (color || 'var(--brass)') : '#fff', color: isIn ? (color ? readableText(color) : 'var(--card)') : isEx ? 'var(--rust)' : 'var(--ink)', textDecoration: isEx ? 'line-through' : 'none' }}>{label}</button>
    );
  };
  // tri-state color swatch: off (thin border) -> include (ink ring) -> exclude (rust ring + x, dimmed)
  const colorChip = (mode, hex) => {
    const isIn = mode === 'in', isEx = mode === 'ex';
    return (
      <button key={hex} onClick={() => cycleMode(setFColorMode, hex)} title={`${hex}${isIn ? ' — included' : isEx ? ' — excluded' : ' — tap to include'}`} className="relative rounded-full flex-shrink-0" style={{ width: '26px', height: '26px', background: hex, border: isIn ? '2px solid var(--ink)' : isEx ? '2px solid var(--rust)' : '1px solid rgba(43,37,32,0.25)', opacity: isEx ? 0.5 : 1 }}>
        {isEx && <span className="absolute inset-0 flex items-center justify-center"><Icon name="x" size={14} color="var(--rust)" /></span>}
      </button>
    );
  };

  return (
    <>
      <Section label="ADD A PIECE">
        <p className="text-xs" style={{ opacity: 0.6 }}>One form for everything. Every piece needs an image and at least one style; materials, objects, colors and palettes are optional. Each piece is saved to the master library (the single source of truth for images); you can also reference it from the current room below.</p>
        <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Name (optional), e.g. Walnut Bench" className="field" />
        <div>
          <input value={url} onChange={(e) => { setUrl(e.target.value); setCrop(null); }} placeholder="Image URL (required)" className="field" style={{ borderColor: url.trim() ? undefined : 'var(--rust)' }} />
          {!url.trim() && <p className="text-xs mt-1" style={{ color: 'var(--rust)', opacity: 0.8 }}>An image URL is required so the piece shows a photo in the quiz.</p>}
        </div>
        {url.trim() && (
          <div className="flex items-center gap-3">
            {cropThumb(url.trim(), crop, 56)}
            <div className="flex flex-col gap-1">
              <button onClick={() => setCropState({ src: url.trim(), initial: crop, apply: setCrop })} className="ghost-button self-start"><Icon name="image" size={13} /> {crop ? 'Adjust crop' : 'Set crop'}</button>
              <span className="text-xs" style={{ opacity: 0.55 }}>{crop ? 'Custom crop set — preview at left.' : 'Cards are vertical (4:5–2:3); set a crop or it centre-fills.'}</span>
            </div>
          </div>
        )}
        <div>
          <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Styles (pick at least one)</p>
          <div className="flex flex-wrap gap-2">{styleTags.map((c) => chip(styles.includes(c.id), c.color, () => setStyles((s) => toggle(s, c.id)), c.label, c.id))}</div>
          <div className="flex gap-2 items-center mt-2">
            <input value={newStyle} onChange={(e) => setNewStyle(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addTagInline('style', newStyle, setStyles, setNewStyle); }} placeholder="New style tag" className="field" style={{ fontSize: '12px' }} />
            <button onClick={() => addTagInline('style', newStyle, setStyles, setNewStyle)} disabled={!newStyle.trim()} className="ghost-button disabled:opacity-40"><Icon name="plus" size={13} /> Add</button>
          </div>
        </div>
        <div>
          <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Materials (optional)</p>
          <div className="flex flex-wrap gap-2">{materialTags.map((m) => chip(mats.includes(m.id), null, () => setMats((s) => toggle(s, m.id)), m.label, m.id))}</div>
          <div className="flex gap-2 items-center mt-2">
            <input value={newMat} onChange={(e) => setNewMat(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addTagInline('material', newMat, setMats, setNewMat); }} placeholder="New material" className="field" style={{ fontSize: '12px' }} />
            <button onClick={() => addTagInline('material', newMat, setMats, setNewMat)} disabled={!newMat.trim()} className="ghost-button disabled:opacity-40"><Icon name="plus" size={13} /> Add</button>
          </div>
        </div>
        <div>
          <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Objects (optional)</p>
          <div className="flex flex-wrap gap-2">{objectTags.map((o) => chip(objs.includes(o.id), null, () => setObjs((s) => toggle(s, o.id)), o.label, o.id))}{objectTags.length === 0 && <span className="text-xs" style={{ opacity: 0.45 }}>No object tags yet — add one below.</span>}</div>
          <div className="flex gap-2 items-center mt-2">
            <input value={newObj} onChange={(e) => setNewObj(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addTagInline('object', newObj, setObjs, setNewObj); }} placeholder="New object, e.g. Sofa" className="field" style={{ fontSize: '12px' }} />
            <button onClick={() => addTagInline('object', newObj, setObjs, setNewObj)} disabled={!newObj.trim()} className="ghost-button disabled:opacity-40"><Icon name="plus" size={13} /> Add</button>
          </div>
        </div>
        <div>
          <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Main colors (optional)</p>
          <SwatchEditor colors={colors} draft={colorDraft} setDraft={setColorDraft} onAdd={() => setColors((c) => (c.includes(colorDraft) ? c : [...c, colorDraft]))} onRemove={(c) => setColors((cs) => cs.filter((x) => x !== c))} />
        </div>
        <div>
          <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Accent colors (optional)</p>
          <SwatchEditor colors={accentColors} draft={accentDraft} setDraft={setAccentDraft} onAdd={() => setAccentColors((c) => (c.includes(accentDraft) ? c : [...c, accentDraft]))} onRemove={(c) => setAccentColors((cs) => cs.filter((x) => x !== c))} />
        </div>
        {paletteTags.length > 0 && (
          <div>
            <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Palettes (optional)</p>
            <div className="flex flex-wrap gap-2">{paletteTags.map((pl) => chip(palettes.includes(pl.id), null, () => setPalettes((s) => toggle(s, pl.id)), pl.label, pl.id))}</div>
          </div>
        )}
        <div>
          <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Every piece is added to the master library. Optionally also reference it from the current room:</p>
          <div className="flex flex-wrap gap-2">
            {chip(toRoom, null, () => setToRoom((v) => !v), `Also add to "${activeQuiz.name}"`, 'dest-room')}
          </div>
        </div>
        <button onClick={submit} disabled={!valid} className="tag-button self-start disabled:opacity-40"><Icon name="plus" size={15} color="var(--card)" /> Add to library{toRoom ? ` + "${activeQuiz.name}"` : ''}</button>
      </Section>

      <Section label={`BUILD "${activeQuiz.name.toUpperCase()}" FROM LIBRARY`}>
        <p className="text-xs" style={{ opacity: 0.6 }}>The library has {library.length} piece{library.length === 1 ? '' : 's'}. Filter, select a group, and add them to this room.</p>
        {library.length === 0 ? (
          <p className="text-xs" style={{ opacity: 0.5 }}>Add some pieces to the library first.</p>
        ) : (
          <>
            <input value={fText} onChange={(e) => setFText(e.target.value)} placeholder="Search by name" className="field" />
            <div className="flex items-center justify-between">
              <p className="text-xs" style={{ opacity: 0.55 }}>Tap a tag to include, tap again to exclude (struck through).</p>
              {filtersActive && <button onClick={clearFilters} className="ghost-button">Clear filters</button>}
            </div>
            <div className="flex flex-wrap gap-2">{styleTags.map((c) => triChip(fTagMode[c.id], c.color, () => cycleMode(setFTagMode, c.id), c.label, c.id))}</div>
            <div className="flex flex-wrap gap-2">{materialTags.map((m) => triChip(fTagMode[m.id], null, () => cycleMode(setFTagMode, m.id), m.label, m.id))}</div>
            {objectTags.length > 0 && <div className="flex flex-wrap gap-2">{objectTags.map((o) => triChip(fTagMode[o.id], null, () => cycleMode(setFTagMode, o.id), o.label, o.id))}</div>}
            {libColors.length > 0 && (
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-xs" style={{ opacity: 0.55 }}>Colors</span>
                {libColors.map((hex) => colorChip(fColorMode[hex], hex))}
              </div>
            )}
            <div className="flex items-center justify-between">
              <span className="font-mono text-xs" style={{ opacity: 0.6 }}>{filtered.length} match{filtered.length === 1 ? '' : 'es'} · {sel.length} selected</span>
              <div className="flex gap-2">
                <button onClick={() => setSel(filtered.map((p) => p.id))} className="ghost-button">Select all</button>
                <button onClick={() => setSel([])} className="ghost-button">Clear</button>
              </div>
            </div>
            <div className="flex flex-col gap-1.5 max-h-72 overflow-auto">
              {filtered.map((p) => {
                const sw = primaryStyle(p, catMap) || { color: '#E4DCC9' };
                const checked = sel.includes(p.id);
                return (
                  <button key={p.id} onClick={() => toggleSel(p.id)} className="flex items-center gap-3 rounded-xl p-2 border text-left" style={{ borderColor: checked ? 'var(--brass)' : 'rgba(43,37,32,0.15)', background: checked ? 'rgba(201,162,39,0.12)' : '#fff' }}>
                    <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 overflow-hidden" style={{ background: sw.color }}>
                      {p.imageUrl ? <img src={p.imageUrl} alt="" className="w-full h-full object-cover" /> : <Icon name="image" size={16} color={readableText(sw.color)} />}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm truncate" style={{ fontStyle: p.name ? undefined : 'italic', opacity: p.name ? 1 : 0.5 }}>{p.name || 'Untitled piece'}</p>
                      <p className="text-xs truncate" style={{ opacity: 0.55 }}>{tagLine(p)}</p>
                    </div>
                    <div className="flex items-center gap-1 flex-shrink-0">
                      {(p.colors || []).slice(0, 3).map((c, i) => <span key={'m' + i} className="w-3.5 h-3.5 rounded-full" style={{ background: c, border: '1px solid rgba(43,37,32,0.15)' }} />)}
                      {(p.accentColors || []).slice(0, 2).map((c, i) => <span key={'a' + i} title="accent" className="w-3.5 h-3.5 rounded-full" style={{ background: c, boxShadow: '0 0 0 1px #fff, 0 0 0 2px rgba(43,37,32,0.4)' }} />)}
                      <span className="ml-1 w-4 h-4 rounded flex items-center justify-center" style={{ border: checked ? 'none' : '1px solid rgba(43,37,32,0.3)', background: checked ? 'var(--brass)' : 'transparent', color: 'var(--card)' }}>{checked ? '✓' : ''}</span>
                    </div>
                  </button>
                );
              })}
              {filtered.length === 0 && <p className="text-xs py-2" style={{ opacity: 0.5 }}>Nothing matches those filters.</p>}
            </div>
            <button onClick={addToRoom} disabled={sel.length === 0} className="tag-button self-start disabled:opacity-40"><Icon name="plus" size={15} color="var(--card)" /> Add {sel.length || ''} selected to "{activeQuiz.name}"</button>
          </>
        )}
      </Section>

      <div>
        <p className="font-mono text-xs tracking-widest mb-3" style={{ opacity: 0.6 }}>MASTER LIBRARY ({library.length})</p>
        <div className="flex flex-col gap-2">
          {library.map((p) => {
            const sw = primaryStyle(p, catMap) || { color: '#E4DCC9' };
            return (
              <div key={p.id} className="rounded-lg p-3" style={{ background: 'var(--card)' }}>
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 overflow-hidden" style={{ background: sw.color }}>
                    {p.imageUrl ? <img src={p.imageUrl} alt="" className="w-full h-full object-cover" /> : <Icon name="image" size={20} color={readableText(sw.color)} />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-medium truncate" style={{ fontStyle: p.name ? undefined : 'italic', opacity: p.name ? 1 : 0.5 }}>{p.name || 'Untitled piece'}</p>
                    <p className="text-xs truncate" style={{ opacity: 0.6 }}>{tagLine(p)}</p>
                  </div>
                  {(p.colors || []).slice(0, 3).map((c, i) => <span key={'m' + i} className="w-3.5 h-3.5 rounded-full flex-shrink-0" style={{ background: c, border: '1px solid rgba(43,37,32,0.15)' }} />)}
                  {(p.accentColors || []).slice(0, 2).map((c, i) => <span key={'a' + i} title="accent" className="w-3.5 h-3.5 rounded-full flex-shrink-0" style={{ background: c, boxShadow: '0 0 0 1px #fff, 0 0 0 2px rgba(43,37,32,0.4)' }} />)}
                  <button onClick={() => setEditingId(editingId === p.id ? null : p.id)} className="p-2 rounded-lg flex-shrink-0" style={{ background: 'rgba(43,37,32,0.06)' }} aria-label="Edit piece"><Icon name="pencil" size={14} /></button>
                  <button onClick={() => { if (confirm('Delete this piece from the master library? It will also be removed from every room that uses it.')) onDeleteLibraryPiece(p.id); }} className="p-2 rounded-lg flex-shrink-0" style={{ background: 'rgba(178,96,63,0.12)', color: 'var(--rust)' }} aria-label="Delete from library"><Icon name="trash" size={14} color="var(--rust)" /></button>
                </div>
                {editingId === p.id && (
                  <div className="flex flex-col gap-3 mt-3 pt-3" style={{ borderTop: '1px dashed rgba(43,37,32,0.15)' }}>
                    <BlurInput value={p.name} onCommit={(v) => onUpdateLibraryPiece(p.id, { name: v.trim() })} placeholder="Name (optional)" />
                    <BlurInput value={p.imageUrl} onCommit={(v) => onUpdateLibraryPiece(p.id, { imageUrl: v.trim() })} placeholder="Image URL (required)" />
                    {p.imageUrl && (
                      <div className="flex items-center gap-3">
                        {cropThumb(p.imageUrl, p.crop, 48)}
                        <button onClick={() => setCropState({ src: p.imageUrl, initial: p.crop, apply: (c) => onUpdateLibraryPiece(p.id, { crop: c }) })} className="ghost-button"><Icon name="image" size={13} /> {p.crop ? 'Adjust crop' : 'Set crop'}</button>
                        {p.crop && <button onClick={() => onUpdateLibraryPiece(p.id, { crop: null })} className="ghost-button">Reset</button>}
                      </div>
                    )}
                    <div>
                      <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Styles</p>
                      <div className="flex flex-wrap gap-2">{styleTags.map((c) => chip((p.tags || []).includes(c.id), c.color, () => onUpdateLibraryPiece(p.id, { tags: toggle(p.tags || [], c.id) }), c.label, c.id))}</div>
                    </div>
                    <div>
                      <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Materials</p>
                      <div className="flex flex-wrap gap-2">{materialTags.map((m) => chip((p.tags || []).includes(m.id), null, () => onUpdateLibraryPiece(p.id, { tags: toggle(p.tags || [], m.id) }), m.label, m.id))}</div>
                    </div>
                    {objectTags.length > 0 && (
                      <div>
                        <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Objects</p>
                        <div className="flex flex-wrap gap-2">{objectTags.map((o) => chip((p.tags || []).includes(o.id), null, () => onUpdateLibraryPiece(p.id, { tags: toggle(p.tags || [], o.id) }), o.label, o.id))}</div>
                      </div>
                    )}
                    {paletteTags.length > 0 && (
                      <div>
                        <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Palettes</p>
                        <div className="flex flex-wrap gap-2">{paletteTags.map((pl) => chip((p.tags || []).includes(pl.id), null, () => onUpdateLibraryPiece(p.id, { tags: toggle(p.tags || [], pl.id) }), pl.label, pl.id))}</div>
                      </div>
                    )}
                    <div>
                      <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Main colors</p>
                      <SwatchEditor colors={p.colors || []} draft={editColorDraft} setDraft={setEditColorDraft} onAdd={() => onUpdateLibraryPiece(p.id, { colors: (p.colors || []).includes(editColorDraft) ? (p.colors || []) : [...(p.colors || []), editColorDraft] })} onRemove={(c) => onUpdateLibraryPiece(p.id, { colors: (p.colors || []).filter((x) => x !== c) })} />
                    </div>
                    <div>
                      <p className="text-xs mb-2" style={{ opacity: 0.6 }}>Accent colors</p>
                      <SwatchEditor colors={p.accentColors || []} draft={editAccentDraft} setDraft={setEditAccentDraft} onAdd={() => onUpdateLibraryPiece(p.id, { accentColors: (p.accentColors || []).includes(editAccentDraft) ? (p.accentColors || []) : [...(p.accentColors || []), editAccentDraft] })} onRemove={(c) => onUpdateLibraryPiece(p.id, { accentColors: (p.accentColors || []).filter((x) => x !== c) })} />
                    </div>
                    <button onClick={() => setEditingId(null)} className="tag-button self-start">Done</button>
                  </div>
                )}
              </div>
            );
          })}
          {library.length === 0 && <p className="text-xs" style={{ opacity: 0.5 }}>The library is empty. Add pieces above.</p>}
        </div>
      </div>
      {cropState && <CropEditor src={cropState.src} initial={cropState.initial} onApply={(c) => { cropState.apply(c); setCropState(null); }} onCancel={() => setCropState(null)} />}
    </>
  );
}

/* ---------------- admin (the ?dev=true gear panel) ---------------- */
function AdminView(props) {
  const { state, activeQuizId, setActiveQuizId, remote, onLoadRemote,
    onRemoveMember, onAddQuiz, onRenameQuiz, onDeleteQuiz,
    onAddTag, onDeleteTag, onAddFacet, onDeleteFacet,
    onAddPieceTo, onUpdateLibraryPiece, onDeleteLibraryPiece, onAddPiecesToRoom,
    onSet, onImport, onReset, error } = props;

  const catMap = useMemo(() => tagIndex(state.tags), [state.tags]);
  const libById = useMemo(() => libIndex(state.library), [state.library]);
  const roomCount = (q) => (q.members || []).length;
  const activeQuiz = state.quizzes.find((q) => q.id === activeQuizId) || state.quizzes[0];
  const activePieces = roomPieces(activeQuiz, libById);
  const [editingId, setEditingId] = useState(null);
  const [newQuizName, setNewQuizName] = useState('');
  // tag manager: add a tag to a chosen facet; style tags also take a color + description, palettes take swatches
  const [tagFacet, setTagFacet] = useState('style');
  const [tagName, setTagName] = useState(''); const [tagColor, setTagColor] = useState(NEW_TAG_PALETTE[0]); const [tagDesc, setTagDesc] = useState('');
  const [tagSwatches, setTagSwatches] = useState([]); const [swatchDraft, setSwatchDraft] = useState('#C9A227');
  const [newFacet, setNewFacet] = useState('');
  const [manifestDraft, setManifestDraft] = useState(state.manifestUrl || '');
  const mkId = (label) => `${slug(label)}-${Date.now().toString(36).slice(-4)}`;
  const submitTag = () => {
    if (!tagName.trim()) return;
    const id = mkId(tagName), label = tagName.trim();
    if (tagFacet === 'style') onAddTag({ id, facet: 'style', label, color: tagColor, desc: tagDesc.trim() || `${label} style.`, custom: true });
    else if (tagFacet === 'palette') onAddTag({ id, facet: 'palette', label, swatches: tagSwatches, custom: true });
    else onAddTag({ id, facet: tagFacet, label, custom: true });
    setTagName(''); setTagDesc(''); setTagSwatches([]); setTagColor(NEW_TAG_PALETTE[Math.floor(Math.random() * NEW_TAG_PALETTE.length)]);
  };
  const submitFacet = () => { const l = newFacet.trim(); if (!l) return; onAddFacet({ key: mkId(l), label: l, kind: 'tag', custom: true }); setNewFacet(''); };

  const exportManifest = () => {
    const manifest = {
      version: 4,
      businessName: state.businessName, destinationEmail: state.destinationEmail,
      // the faceted vocabulary + master library travel with the manifest, so publishing it
      // shares the whole database with every browser that loads this source
      facets: state.facets,
      tags: state.tags,
      // derived legacy lists, so an older cached client still resolves styles / materials
      categories: facetTags(state.tags, 'style').map((t) => ({ key: t.id, label: t.label, color: t.color, desc: t.desc, custom: t.custom })),
      materials: facetTags(state.tags, 'material').map((t) => ({ key: t.id, label: t.label })),
      library: state.library,
      rooms: state.quizzes.map((q) => ({ id: q.id, name: q.name, file: q.file || `${slug(q.name)}.json` })),
    };
    download('manifest.json', JSON.stringify(manifest, null, 2));
  };
  const exportRoom = (q) => download(q.file || `${slug(q.name)}.json`, JSON.stringify({ name: q.name, members: q.members || [] }, null, 2));

  return (
    <div className="w-full max-w-md flex flex-col gap-5">
      <div>
        <p className="font-display text-2xl mb-1">Manage</p>
        <p className="text-sm" style={{ opacity: 0.7 }}>Build and preview here, then publish by hosting the JSON files. Point the app at your hosted manifest so every visitor loads the same rooms.</p>
      </div>
      {error && <div className="text-sm rounded-xl px-3 py-2" style={{ background: 'rgba(178,96,63,0.15)', color: 'var(--rust)' }}>{error}</div>}

      <Section label="HOW THE QUIZ RUNS">
        <p className="text-xs" style={{ opacity: 0.7 }}>Pieces are shown in a random order each time. A client answers at least {MIN_QUESTIONS} pieces (or all of them, if the room has fewer). Once past {MIN_QUESTIONS} a "Stop &amp; see my results" button appears, and the quiz always ends when every piece has been seen. For the richest result, give each room at least {MIN_QUESTIONS} pieces.</p>
        <p className="text-xs" style={{ opacity: 0.55 }}>This room currently has {activePieces.length} piece{activePieces.length === 1 ? '' : 's'}.</p>
      </Section>

      <Section label="HOSTED SOURCE">
        <input value={manifestDraft} onChange={(e) => setManifestDraft(e.target.value)} placeholder="https://your-site.com/quiz/manifest.json" className="field" />
        <div className="flex flex-wrap gap-2 items-center">
          <button onClick={() => onLoadRemote(manifestDraft.trim())} disabled={!manifestDraft.trim() || remote.loading} className="tag-button disabled:opacity-40"><Icon name="cloud" size={15} color="var(--card)" /> {remote.loading ? 'Loading...' : 'Load from URL'}</button>
          {state.manifestUrl && !remote.loading && <span className="font-mono text-xs" style={{ opacity: 0.55 }}>Active source set</span>}
        </div>
        {remote.error && <p className="text-xs" style={{ color: 'var(--rust)' }}>{remote.error}</p>}
        <p className="text-xs" style={{ opacity: 0.55 }}>The host must allow cross-origin reads (CORS), or serve the files from the same site as this page. Loading replaces the rooms, categories, materials, and master library below with the hosted copy.</p>
      </Section>

      <Section label="PUBLISH (DOWNLOAD FILES TO HOST)">
        <button onClick={exportManifest} className="ghost-button self-start"><Icon name="download" size={14} /> manifest.json</button>
        <div className="flex flex-col gap-1.5">
          {state.quizzes.map((q) => (
            <button key={q.id} onClick={() => exportRoom(q)} className="ghost-button self-start"><Icon name="download" size={14} /> {q.file || `${slug(q.name)}.json`}</button>
          ))}
        </div>
        <p className="text-xs" style={{ opacity: 0.55 }}>Upload these to the same folder on your host, then paste the manifest.json link above. <b>manifest.json</b> now carries the shared master library and materials, so publishing it shares the whole database with every browser that loads this source.</p>
      </Section>

      <Section label="WHERE RESULTS GO">
        <BlurInput value={state.businessName} onCommit={(v) => onSet({ businessName: v })} placeholder="Your business name (shown to clients)" />
        <BlurInput value={state.destinationEmail} onCommit={(v) => onSet({ destinationEmail: v })} placeholder="Your email, e.g. studio@example.com" />
        <p className="text-xs" style={{ opacity: 0.55 }}>The "Send to us" button on the results screen emails this address, with the full piece-by-piece breakdown and the client's notes.</p>
      </Section>

      <Section label="ROOMS / QUIZZES">
        <div className="flex flex-col gap-2">
          {state.quizzes.map((q) => (
            <div key={q.id} className="flex items-center gap-2">
              <button onClick={() => setActiveQuizId(q.id)} className="flex-1 text-left rounded-xl px-3 py-2 border" style={{ borderColor: q.id === activeQuiz.id ? 'var(--brass)' : 'rgba(43,37,32,0.2)', background: q.id === activeQuiz.id ? 'rgba(201,162,39,0.12)' : '#fff' }}>
                <span className="text-sm font-medium">{q.name}</span>
                <span className="font-mono text-xs ml-2" style={{ opacity: 0.5 }}>{roomCount(q)}</span>
              </button>
              <button onClick={() => { const n = prompt('Rename room', q.name); if (n && n.trim()) onRenameQuiz(q.id, n.trim()); }} className="p-2 rounded-lg" style={{ background: 'rgba(43,37,32,0.06)' }} aria-label="Rename"><Icon name="pencil" size={14} /></button>
              {state.quizzes.length > 1 && <button onClick={() => { if (confirm(`Delete "${q.name}" and its pieces?`)) onDeleteQuiz(q.id); }} className="p-2 rounded-lg" style={{ background: 'rgba(178,96,63,0.12)', color: 'var(--rust)' }} aria-label="Delete"><Icon name="trash" size={14} color="var(--rust)" /></button>}
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={newQuizName} onChange={(e) => setNewQuizName(e.target.value)} placeholder="New room, e.g. Kitchen" className="field" />
          <button onClick={() => { if (newQuizName.trim()) { onAddQuiz(newQuizName.trim()); setNewQuizName(''); } }} className="tag-button" aria-label="Add room"><Icon name="plus" size={15} color="var(--card)" /></button>
        </div>
      </Section>

      <Section label="TAGS">
        <p className="text-xs" style={{ opacity: 0.6 }}>One vocabulary, organised by facet. Pieces reference these by tag. Colors are free swatches on each piece; a palette is a saved, named group of swatches. Only facets marked "scored" drive the quiz result.</p>
        {state.facets.filter((f) => f.kind !== 'swatch').map((f) => {
          const ft = facetTags(state.tags, f.key);
          return (
            <div key={f.key}>
              <div className="flex items-center justify-between mb-1.5">
                <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>{(f.label || f.key).toUpperCase()}{f.scored ? ' · SCORED' : ''}</p>
                {f.custom && ft.length === 0 && <button onClick={() => { if (confirm(`Remove the "${f.label}" facet?`)) onDeleteFacet(f.key); }} aria-label="Remove facet" style={{ opacity: 0.5 }}><Icon name="trash" size={12} /></button>}
              </div>
              <div className="flex flex-wrap gap-2">
                {ft.map((t) => {
                  const isStyle = f.key === 'style';
                  const removable = !isStyle || t.custom;
                  const fg = isStyle ? (t.text || readableText(t.color)) : 'var(--ink)';
                  return (
                    <span key={t.id} className="text-xs rounded-full pl-3 pr-1.5 py-1.5 flex items-center gap-1.5 border" style={{ borderColor: isStyle ? t.color : 'rgba(43,37,32,0.25)', background: isStyle ? t.color : '#fff', color: fg }}>
                      {f.key === 'palette' && (t.swatches || []).slice(0, 4).map((c, i) => <span key={i} className="w-3 h-3 rounded-full" style={{ background: c, border: '1px solid rgba(43,37,32,0.15)' }} />)}
                      {t.label}
                      {removable && <button onClick={() => { if (confirm(`Remove "${t.label}"? It will also be removed from any pieces using it.`)) onDeleteTag(t.id); }} aria-label="Remove tag" style={{ lineHeight: 0 }}><Icon name="x" size={13} color={fg} /></button>}
                    </span>
                  );
                })}
                {ft.length === 0 && <span className="text-xs" style={{ opacity: 0.5 }}>No {(f.label || f.key).toLowerCase()} tags yet.</span>}
              </div>
            </div>
          );
        })}
        <div className="flex flex-col gap-2 pt-2" style={{ borderTop: '1px dashed rgba(43,37,32,0.15)' }}>
          <p className="text-xs" style={{ opacity: 0.6 }}>Add a tag</p>
          <div className="flex flex-wrap gap-2">
            {state.facets.filter((f) => f.kind !== 'swatch').map((f) => (
              <button key={f.key} onClick={() => setTagFacet(f.key)} className="text-xs rounded-full px-3 py-1.5 border" style={{ borderColor: tagFacet === f.key ? 'var(--brass)' : 'rgba(43,37,32,0.2)', background: tagFacet === f.key ? 'var(--brass)' : '#fff', color: tagFacet === f.key ? 'var(--card)' : 'var(--ink)' }}>{f.label || f.key}</button>
            ))}
          </div>
          <div className="flex gap-2 items-center">
            <input value={tagName} onChange={(e) => setTagName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') submitTag(); }} placeholder="New tag name" className="field" />
            {tagFacet === 'style' && <input type="color" value={tagColor} onChange={(e) => setTagColor(e.target.value)} className="w-10 h-10 rounded-lg p-0 flex-shrink-0" style={{ border: '1px solid rgba(43,37,32,0.2)' }} aria-label="Tag color" />}
          </div>
          {tagFacet === 'style' && <input value={tagDesc} onChange={(e) => setTagDesc(e.target.value)} placeholder="Short description (shown on results)" className="field" />}
          {tagFacet === 'palette' && <SwatchEditor colors={tagSwatches} draft={swatchDraft} setDraft={setSwatchDraft} onAdd={() => setTagSwatches((c) => (c.includes(swatchDraft) ? c : [...c, swatchDraft]))} onRemove={(c) => setTagSwatches((cs) => cs.filter((x) => x !== c))} />}
          <button onClick={submitTag} disabled={!tagName.trim()} className="tag-button self-start disabled:opacity-40"><Icon name="plus" size={15} color="var(--card)" /> Add tag</button>
        </div>
        <div className="flex gap-2 items-center pt-2" style={{ borderTop: '1px dashed rgba(43,37,32,0.15)' }}>
          <input value={newFacet} onChange={(e) => setNewFacet(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') submitFacet(); }} placeholder="New facet, e.g. Finish, Era, Mood" className="field" />
          <button onClick={submitFacet} disabled={!newFacet.trim()} className="ghost-button disabled:opacity-40" aria-label="Add facet"><Icon name="plus" size={13} /> Facet</button>
        </div>
      </Section>

      <LibraryManager facets={state.facets} tags={state.tags} library={state.library} activeQuiz={activeQuiz} catMap={catMap}
        onAddPieceTo={onAddPieceTo} onUpdateLibraryPiece={onUpdateLibraryPiece} onDeleteLibraryPiece={onDeleteLibraryPiece} onAddPiecesToRoom={onAddPiecesToRoom}
        onAddTag={onAddTag} />

      <div>
        <p className="font-mono text-xs tracking-widest mb-3" style={{ opacity: 0.6 }}>PIECES IN "{activeQuiz.name.toUpperCase()}" ({activePieces.length})</p>
        <div className="flex flex-col gap-2">
          {activePieces.map((card) => {
            const sw = primaryStyle(card, catMap) || { color: '#E4DCC9' };
            const isEditing = editingId === card.id;
            const orphan = !primaryStyle(card, catMap);
            return (
              <div key={card.id} className="rounded-lg p-3" style={{ background: 'var(--card)' }}>
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 overflow-hidden" style={{ background: sw.color }}>
                    {card.imageUrl ? <img src={card.imageUrl} alt="" className="w-full h-full object-cover" /> : <Icon name="image" size={20} color={sw.text || readableText(sw.color)} />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-medium truncate" style={{ fontStyle: card.name ? undefined : 'italic', opacity: card.name ? 1 : 0.5 }}>{card.name || 'Untitled piece'}</p>
                    <p className="text-xs truncate" style={{ opacity: 0.6, color: orphan ? 'var(--rust)' : undefined }}>{orphan ? 'no style, will not score' : card.tags.map((t) => catMap[t]?.label || '?').join(', ')}</p>
                  </div>
                  <button onClick={() => setEditingId(isEditing ? null : card.id)} className="p-2 rounded-lg" style={{ background: 'rgba(43,37,32,0.06)' }} aria-label="Edit piece"><Icon name="pencil" size={14} /></button>
                  <button onClick={() => onRemoveMember(activeQuiz.id, card.libId)} className="p-2 rounded-lg" style={{ background: 'rgba(178,96,63,0.12)', color: 'var(--rust)' }} aria-label="Remove from room" title="Remove from this room (keeps it in the master library)"><Icon name="trash" size={14} color="var(--rust)" /></button>
                </div>
                {isEditing && (
                  <div className="flex flex-col gap-3 mt-3 pt-3" style={{ borderTop: '1px dashed rgba(43,37,32,0.15)' }}>
                    <p className="text-xs" style={{ opacity: 0.55, fontStyle: 'italic' }}>Editing the master library piece — changes apply to every room that uses it.</p>
                    <BlurInput value={card.name} onCommit={(v) => onUpdateLibraryPiece(card.libId, { name: v.trim() })} placeholder="Name (optional)" />
                    <BlurInput value={card.imageUrl} onCommit={(v) => onUpdateLibraryPiece(card.libId, { imageUrl: v.trim() })} placeholder={card.imageUrl ? 'Replace image URL' : 'Add image URL'} />
                    <p className="text-xs" style={{ opacity: 0.6 }}>Styles</p>
                    <div className="flex flex-wrap gap-2">
                      {facetTags(state.tags, 'style').map((c) => {
                        const active = card.tags.includes(c.id);
                        return <button key={c.id} onClick={() => onUpdateLibraryPiece(card.libId, { tags: active ? card.tags.filter((t) => t !== c.id) : [...card.tags, c.id] })} className="text-xs rounded-full px-3 py-1.5 border" style={{ borderColor: active ? c.color : 'rgba(43,37,32,0.2)', background: active ? c.color : '#fff', color: active ? (c.text || readableText(c.color)) : 'var(--ink)' }}>{c.label}</button>;
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="flex flex-wrap gap-2">
        <label className="ghost-button" style={{ cursor: 'pointer' }}><Icon name="upload" size={14} /> Import full config<input type="file" accept="application/json" onChange={onImport} className="hidden" /></label>
        <button onClick={onReset} className="ghost-button"><Icon name="rotate" size={14} /> Reset everything</button>
      </div>
    </div>
  );
}

/* ---------------- app ---------------- */
function App() {
  const [state, setState] = useState(null);
  const [view, setView] = useState('picker');
  const [activeQuizId, setActiveQuizId] = useState(null);
  const [runQuiz, setRunQuiz] = useState(null);
  const [index, setIndex] = useState(0);
  const [scores, setScores] = useState({});
  const [history, setHistory] = useState([]);
  const [note, setNote] = useState('');
  const [exiting, setExiting] = useState(null);
  const [error, setError] = useState(null);
  const [remote, setRemote] = useState({ loading: false, error: null });
  const [vp, setVp] = useState(() => ({ w: typeof window !== 'undefined' ? window.innerWidth : 1024, h: typeof window !== 'undefined' ? window.innerHeight : 768 }));
  const didInit = useRef(false);

  const persist = (next) => {
    setState(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); setError(null); }
    catch (e) { setError('Could not cache locally. Edits may be lost on reload.'); }
  };

  const applyRemote = (base, data) => {
    // loading replaces the vocabulary: prefer a new manifest's facets/tags; otherwise rebuild
    // from an old manifest's categories/materials; otherwise keep the local vocabulary
    let tags = base.tags, facets = data.facets != null ? data.facets : base.facets;
    if (data.tags != null) tags = data.tags;
    else if (data.categories != null) tags = [
      ...data.categories.map((c) => ({ id: c.key, facet: 'style', label: c.label, color: c.color, desc: c.desc, custom: c.custom })),
      ...((data.materials || []).map((m) => ({ id: m.key, facet: 'material', label: m.label, custom: true }))),
    ];
    const next = withDefaults({
      ...base,
      quizzes: data.quizzes,
      facets,
      tags,
      // the master library comes from the manifest when present; otherwise keep local
      library: data.library != null ? data.library : base.library,
      businessName: data.businessName != null ? data.businessName : base.businessName,
      destinationEmail: data.destinationEmail != null ? data.destinationEmail : base.destinationEmail,
      categories: undefined, materials: undefined,
    });
    persist(next);
    setActiveQuizId(next.quizzes[0] ? next.quizzes[0].id : null);
    return next;
  };

  const doLoadRemote = async (url) => {
    setRemote({ loading: true, error: null });
    try {
      const data = await loadFromManifest(url);
      const base = (state || DEFAULT_STATE);
      applyRemote({ ...base, manifestUrl: url }, data);
      setRemote({ loading: false, error: null });
      setView('picker');
    } catch (e) {
      setRemote({ loading: false, error: `Could not load: ${e.message}. Check the URL and CORS settings.` });
    }
  };

  useEffect(() => {
    if (didInit.current) return; didInit.current = true;
    let s = DEFAULT_STATE;
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) { const p = JSON.parse(stored); if (p && (p.version === 3 || p.version === 4) && Array.isArray(p.quizzes) && p.quizzes.length) s = p; }
    } catch (e) {}
    s = withDefaults(s);
    setState(s);
    setActiveQuizId(s.quizzes[0].id);
    // a ?room= link jumps straight into that room once its pieces are ready
    const autoStart = (quizzes) => { const q = findQuizByParam(quizzes, ROOM_PARAM); if (q) beginQuiz(q); };
    if (s.manifestUrl) {
      // refresh from hosted source on load, fall back to cached copy on failure
      (async () => {
        setRemote({ loading: true, error: null });
        try { const data = await loadFromManifest(s.manifestUrl); const next = applyRemote(s, data); setRemote({ loading: false, error: null }); autoStart(next.quizzes); }
        catch (e) { setRemote({ loading: false, error: `Using cached copy. Live load failed: ${e.message}` }); autoStart(s.quizzes); }
      })();
    } else {
      autoStart(s.quizzes);
    }
  }, []);

  // track viewport so the desktop card can size itself to each photo
  useEffect(() => {
    const onResize = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // memoized so they only rebuild when the vocabulary / library actually change, not on every render
  const catMap = useMemo(() => tagIndex(state && state.tags), [state && state.tags]);
  const libById = useMemo(() => libIndex(state && state.library), [state && state.library]);
  // hydrate a room's references into runnable pieces, then shuffle for the run
  const beginQuiz = (q) => { const pieces = roomPieces(q, libById); if (!pieces.length) return; setRunQuiz({ ...q, pieces: shuffle(pieces) }); setIndex(0); setScores({}); setHistory([]); setNote(''); setExiting(null); setView('quiz'); };

  const handleAction = (action) => {
    if (exiting || !runQuiz) return;
    setExiting(action.key);
    const currentNote = note.trim();
    setTimeout(() => {
      const card = runQuiz.pieces[index];
      const applied = {};
      // only style tags drive the scored result; other facets ride along in the response record
      const scored = card.tags.filter((t) => catMap[t] && catMap[t].facet === 'style');
      setScores((prev) => { const n = { ...prev }; scored.forEach((t) => { n[t] = (n[t] || 0) + action.delta; applied[t] = (applied[t] || 0) + action.delta; }); return n; });
      // a full record of this reaction, so the team can read the run piece by piece
      const response = { pieceId: card.id, pieceName: card.name, imageUrl: card.imageUrl, tags: [...card.tags], colors: [...(card.colors || [])], accentColors: [...(card.accentColors || [])], actionKey: action.key, actionLabel: action.label, delta: action.delta, note: currentNote };
      setHistory((h) => [...h, { index, applied, response }]);
      setNote('');
      if (index + 1 >= runQuiz.pieces.length) setView('results');
      else setIndex((i) => i + 1);
      setExiting(null);
    }, 300);
  };
  const handleUndo = () => {
    if (exiting || history.length === 0) return;
    const last = history[history.length - 1];
    setScores((prev) => { const n = { ...prev }; Object.entries(last.applied).forEach(([k, v]) => { n[k] = (n[k] || 0) - v; }); return n; });
    setHistory((h) => h.slice(0, -1));
    setIndex(last.index);
    setNote(last.response ? last.response.note : '');
  };
  const handleStop = () => { if (exiting) return; setView('results'); };

  const updateQuiz = (qid, fn) => persist({ ...state, quizzes: state.quizzes.map((q) => q.id === qid ? fn(q) : q) });
  // rooms only hold references now: removing a piece drops the member (the library entry stays)
  const onRemoveMember = (qid, libId) => updateQuiz(qid, (q) => ({ ...q, members: (q.members || []).filter((m) => m.libId !== libId) }));
  const onAddQuiz = (name) => { const id = `q-${Date.now()}`; persist({ ...state, quizzes: [...state.quizzes, { id, name, file: `${slug(name)}.json`, members: [] }] }); setActiveQuizId(id); };
  const onRenameQuiz = (qid, name) => updateQuiz(qid, (q) => ({ ...q, name, file: q.file || `${slug(name)}.json` }));
  const onDeleteQuiz = (qid) => { const rest = state.quizzes.filter((q) => q.id !== qid); persist({ ...state, quizzes: rest }); if (activeQuizId === qid) setActiveQuizId(rest[0].id); };
  const onSet = (patch) => persist({ ...state, ...patch });

  // unified faceted vocabulary + master library (the "big database" admin tooling).
  // Tags live on library pieces; rooms only reference them, so stripping a deleted tag
  // touches the library only.
  const onAddTag = (tag) => persist({ ...state, tags: [...state.tags, tag] });
  const onDeleteTag = (id) => persist({ ...state, tags: state.tags.filter((t) => t.id !== id), library: (state.library || []).map((p) => ({ ...p, tags: (p.tags || []).filter((t) => t !== id) })) });
  const onAddFacet = (facet) => persist({ ...state, facets: [...state.facets, facet] });
  const onDeleteFacet = (key) => persist({ ...state, facets: state.facets.filter((f) => f.key !== key), tags: state.tags.filter((t) => t.facet !== key) });
  const onUpdateLibraryPiece = (pid, patch) => persist({ ...state, library: (state.library || []).map((p) => p.id === pid ? { ...p, ...patch } : p) });
  // deleting a library piece also drops every room reference to it (no dangling members)
  const onDeleteLibraryPiece = (pid) => persist({ ...state, library: (state.library || []).filter((p) => p.id !== pid), quizzes: state.quizzes.map((q) => ({ ...q, members: (q.members || []).filter((m) => m.libId !== pid) })) });
  // adding to a room is idempotent: skip pieces already referenced (a room is a set, no duplicates)
  const onAddPiecesToRoom = (qid, libIds) => updateQuiz(qid, (q) => { const have = new Set((q.members || []).map((m) => m.libId)); const add = libIds.filter((id) => !have.has(id)).map((id) => ({ libId: id })); return { ...q, members: [...(q.members || []), ...add] }; });
  // unified "add a piece": ALWAYS creates the master library entry (single source of truth),
  // then optionally references it from a room — in ONE persist (avoids stale-state clobber)
  const onAddPieceTo = ({ base, roomId }) => {
    const libId = `lib${Date.now()}`;
    let next = { ...state, library: [...(state.library || []), { id: libId, ...base }] };
    if (roomId) next = { ...next, quizzes: next.quizzes.map((q) => q.id === roomId ? { ...q, members: [...(q.members || []), { libId }] } : q) };
    persist(next);
  };

  const onImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const p = JSON.parse(ev.target.result);
        if (p && (p.version === 3 || p.version === 4) && Array.isArray(p.quizzes) && p.quizzes.length) { const np = withDefaults(p); persist(np); setActiveQuizId(np.quizzes[0].id); }
        else setError('That file does not look like a full config export.');
      } catch (err) { setError('Could not read that file.'); }
    };
    reader.readAsText(file); e.target.value = '';
  };
  const onResetAll = () => { if (confirm('Reset everything to the starter setup? This clears the hosted source link too.')) { persist(DEFAULT_STATE); setActiveQuizId(DEFAULT_STATE.quizzes[0].id); setRemote({ loading: false, error: null }); } };

  if (!state) return <div style={{ minHeight: '100vh', background: '#EAE2D3' }} />;
  // scoring is built from the pieces actually answered, so an early stop is fair
  const responses = history.map((h) => h.response).filter(Boolean);
  const counts = {};
  const styleOf = (r) => r.tags.filter((t) => catMap[t] && catMap[t].facet === 'style');
  responses.forEach((r) => styleOf(r).forEach((t) => { counts[t] = (counts[t] || 0) + 1; }));
  const usedKeys = [...new Set(responses.flatMap(styleOf))];
  const minRequired = runQuiz ? Math.min(MIN_QUESTIONS, runQuiz.pieces.length) : 0;
  const isDesktop = vp.w >= 768;

  return (
    <div className="min-h-screen w-full flex flex-col items-center px-4 py-6 relative" style={{ '--canvas': '#F4F1EA', '--ink': '#2B2A26', '--card': '#FFFFFF', '--sage': '#7C9A6E', '--rust': '#BE4A3A', '--brass': '#C5A23C', background: 'var(--canvas)', color: 'var(--ink)', fontFamily: "'Montserrat', sans-serif" }}>
      {(!isDesktop || view === 'admin') ? (
        <div className="w-full max-w-md flex items-center justify-between mb-6">
          <div className="flex items-center gap-2">
            <div className="w-4 h-4 rounded" style={{ background: 'var(--brass)' }} />
            <span className="font-display text-lg">Find Your Style</span>
          </div>
          {view === 'admin'
            ? <button onClick={() => setView('picker')} className="p-2 rounded-lg" style={{ background: 'var(--card)' }} aria-label="Back"><Icon name="arrow-left" size={16} /></button>
            : DEV_MODE
              ? <button onClick={() => setView('admin')} className="p-2 rounded-lg" style={{ background: 'var(--card)' }} aria-label="Manage"><Icon name="settings" size={16} /></button>
              : null}
        </div>
      ) : (
        // desktop client view: hide the header for more vertical room; float the gear for dev only
        DEV_MODE
          ? <button onClick={() => setView('admin')} className="absolute top-4 right-4 p-2 rounded-lg z-10" style={{ background: 'var(--card)' }} aria-label="Manage"><Icon name="settings" size={16} /></button>
          : null
      )}

      {view === 'picker' ? (
        remote.loading ? (
          <p className="font-mono text-sm mt-10" style={{ opacity: 0.6 }}>Loading rooms from your hosted source...</p>
        ) : state.quizzes.length === 1 ? (
          (() => {
            const total = roomPieces(state.quizzes[0], libById).length;
            const minN = Math.min(MIN_QUESTIONS, total);
            return (
              <div className="w-full max-w-xs flex flex-col items-center text-center gap-5 mt-6">
                <p className="font-display text-4xl leading-tight">What's your<br />style?</p>
                <p className="text-sm" style={{ opacity: 0.75 }}>{total > MIN_QUESTIONS
                  ? `Swipe through at least ${minN} of ${total} pieces in random order, then stop whenever you like. Tap how you feel about each one and add a note if you want.`
                  : `Swipe through ${total} piece${total === 1 ? '' : 's'} in random order. Tap how you feel about each one, add a note if you want, no rush, no right answers.`}</p>
                <div className="w-full grid grid-cols-2 gap-3 text-xs font-mono" style={{ opacity: 0.7 }}>
                  <div className="flex items-center gap-2 justify-center"><Icon name="x" size={14} /> Pass / Never</div>
                  <div className="flex items-center gap-2 justify-center"><Icon name="heart" size={14} /> Like / Love it</div>
                </div>
                <button onClick={() => beginQuiz(state.quizzes[0])} className="tag-button mt-2">Begin</button>
              </div>
            );
          })()
        ) : <PickerView quizzes={state.quizzes} onPick={beginQuiz} libById={libById} />
      ) : view === 'quiz' ? (
        <QuizView pieces={runQuiz.pieces} index={index} onAction={handleAction} onUndo={handleUndo} canUndo={history.length > 0} undoCount={history.length} exiting={exiting} catMap={catMap} minRequired={minRequired} note={note} setNote={setNote} onStop={handleStop} isDesktop={isDesktop} vw={vp.w} vh={vp.h} />
      ) : view === 'results' ? (
        <ResultsView scores={scores} counts={counts} usedKeys={usedKeys} responses={responses} catMap={catMap} quizName={runQuiz.name} destinationEmail={state.destinationEmail} businessName={state.businessName || 'our team'} onRestart={() => setView('picker')} />
      ) : (
        <AdminView state={state} activeQuizId={activeQuizId} setActiveQuizId={setActiveQuizId} remote={remote} onLoadRemote={doLoadRemote}
          onRemoveMember={onRemoveMember}
          onAddQuiz={onAddQuiz} onRenameQuiz={onRenameQuiz} onDeleteQuiz={onDeleteQuiz}
          onAddTag={onAddTag} onDeleteTag={onDeleteTag} onAddFacet={onAddFacet} onDeleteFacet={onDeleteFacet}
          onAddPieceTo={onAddPieceTo} onUpdateLibraryPiece={onUpdateLibraryPiece} onDeleteLibraryPiece={onDeleteLibraryPiece} onAddPiecesToRoom={onAddPiecesToRoom}
          onSet={onSet} onImport={onImport} onReset={onResetAll} error={error} />
      )}
      {view === 'picker' && !remote.loading && <InfoButton />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // Compile the app source with the classic JSX runtime (React.createElement),
  // then run it as a normal global script. This is independent of which

  (function () {
    try {
      if (typeof Babel === 'undefined' || typeof React === 'undefined') {
        throw new Error('Could not load React/Babel from the CDN. Check your internet connection.');
      }
      var src = document.getElementById('app-source').textContent;
      var compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
      var s = document.createElement('script');
      s.textContent = compiled;
      document.body.appendChild(s);
    } catch (err) {
      // Surface the failure instead of leaving a blank page.
      document.getElementById('root').innerHTML =
        '<div style="max-width:28rem;margin:4rem auto;padding:0 1rem;font-family:sans-serif;color:#2B2520;text-align:center">' +
        '<p style="font-size:1.25rem;margin-bottom:.5rem">Could not start the quiz</p>' +
        '<p style="font-size:.875rem;opacity:.7">' + (err && err.message ? err.message : err) + '</p></div>';
      throw err;
    }
  })();
</script>
