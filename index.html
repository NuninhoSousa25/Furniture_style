<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Find Your Style, a furniture quiz</title>
<!-- Content-Security-Policy: a static site (GitHub Pages) can't set this via a real HTTP
     header, so it's a <meta> tag — note that frame-ancestors/sandbox/report-* are ignored
     here by spec and would need a real header if ever added. style-src needs 'unsafe-inline'
     because React sets every component's style via inline style props, and the Tailwind CDN
     script injects a generated <style> at runtime; img-src/connect-src are wide open because
     "paste any hosted image/manifest URL" is a core, by-design feature of this app. */ -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src * data:; connect-src 'self' https: http:; object-src 'none'; base-uri 'self';" />
<!-- Versions pinned + Subresource Integrity hashes added so a compromised/altered CDN
     response is refused by the browser instead of silently executed. cdn.tailwindcss.com is
     left unpinned: it's an unversioned, dynamically-generated endpoint by design (Tailwind's
     own docs say not to use it in production) — replacing it with a compiled stylesheet would
     remove this gap entirely, see README "Stack & build". -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js" integrity="sha384-ezQ6HS3FLspd9te19o2McUV6FAK091+GG7KO54f/R8DKgCDi7fULhapNrd5LY+vG" crossorigin="anonymous"></script>
<link rel="stylesheet" href="app/index.css" />
</head>
<body>
<div id="root"></div>

<!-- The app lives in app/*.js (JSX, split into focused files). We fetch them in dependency
     order, concatenate, and compile the whole thing once with Babel (classic runtime) — one
     shared global scope, no module system. We do NOT use type="text/babel" auto-run: recent
     @babel/standalone builds default the react preset to the automatic runtime, which emits
     bare `import` statements that break in a plain (non-module) page.
     Because this fetches the app files, the app MUST be served over http:// (the included dev
     server, or any static host such as GitHub Pages). Opening index.html via file:// will
     not work — fetch is blocked on file://. -->
<script>
  (function () {
    var root = document.getElementById('root');
    // Builds the failure message via DOM APIs + textContent (never innerHTML), so this stays
    // safe even if a future change starts passing a less-trusted string into `msg`.
    function fail(msg) {
      var wrap = document.createElement('div');
      wrap.style.cssText = 'max-width:28rem;margin:4rem auto;padding:0 1rem;font-family:sans-serif;color:#2B2520;text-align:center';
      var title = document.createElement('p');
      title.style.cssText = 'font-size:1.25rem;margin-bottom:.5rem';
      title.textContent = 'Could not start the quiz';
      var detail = document.createElement('p');
      detail.style.cssText = 'font-size:.875rem;opacity:.7';
      detail.textContent = msg;
      wrap.appendChild(title); wrap.appendChild(detail);
      root.textContent = '';
      root.appendChild(wrap);
    }
    if (typeof Babel === 'undefined' || typeof React === 'undefined') {
      fail('Could not load React/Babel from the CDN. Check your internet connection.');
      return;
    }
    // app source files, in dependency / load order. To add a file, insert it in the right spot.
    var FILES = [
      'app/helpers.js', 'app/model.js', 'app/quiz.js', 'app/results.js',
      'app/editors.js', 'app/library.js', 'app/admin.js', 'app/main.js'
    ];
    Promise.all(FILES.map(function (f) {
      return fetch(f, { cache: 'no-store' }).then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' loading ' + f);
        return r.text();
      });
    }))
      .then(function (parts) {
        // Concatenate (a bare ; between files guards top-level ASI), then compile with the
        // classic JSX runtime (React.createElement) and run as one global script.
        var compiled = Babel.transform(parts.join('\n;\n'), { presets: [['react', { runtime: 'classic' }]] }).code;
        var s = document.createElement('script');
        s.textContent = compiled;
        document.body.appendChild(s);
      })
      .catch(function (err) {
        var m = (err && err.message) ? err.message : String(err);
        if (location.protocol === 'file:') {
          m = 'This app must be served over http:// — open it through the dev server (python -m http.server) rather than double-clicking the file.';
        }
        fail(m);
      });
  })();
</script>
</body>
</html>
