<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Find Your Style, a furniture quiz</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  html, body { margin: 0; padding: 0; }
  .font-display { font-family: 'Fraunces', serif; }
  .font-mono { font-family: 'IBM Plex Mono', monospace; }
  .tag-button { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.05em; padding: 10px 18px; border-radius: 999px; border: 1px solid var(--ink); background: var(--ink); color: var(--card); cursor: pointer; }
  .ghost-button { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(43,37,32,0.25); background: transparent; color: var(--ink); cursor: pointer; }
  .field { border-radius: 12px; padding: 8px 12px; border: 1px solid rgba(43,37,32,0.2); background: #fff; font-size: 14px; width: 100%; box-sizing: border-box; }
  .exit-left { animation: exitLeft 0.3s ease forwards; }
  .exit-left-strong { animation: exitLeftStrong 0.3s ease forwards; }
  .exit-right { animation: exitRight 0.3s ease forwards; }
  .exit-right-strong { animation: exitRightStrong 0.3s ease forwards; }
  @keyframes exitLeft { to { transform: translateX(-130%) rotate(-10deg); opacity: 0; } }
  @keyframes exitLeftStrong { to { transform: translateX(-170%) rotate(-22deg); opacity: 0; } }
  @keyframes exitRight { to { transform: translateX(130%) rotate(10deg); opacity: 0; } }
  @keyframes exitRightStrong { to { transform: translateX(170%) rotate(22deg); opacity: 0; } }
  .stamp { animation: stampIn 0.2s ease forwards; }
  @keyframes stampIn { from { opacity: 0; transform: scale(1.5) rotate(-10deg); } to { opacity: 1; transform: scale(1) rotate(-10deg); } }
  @media (prefers-reduced-motion: reduce) { .exit-left, .exit-left-strong, .exit-right, .exit-right-strong, .stamp { animation: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<!-- App source is compiled by Babel below with the classic JSX runtime.
     We do NOT use type="text/babel" auto-run: recent @babel/standalone builds
     default the react preset to the automatic runtime, which emits bare
     `import` statements that break in a plain (non-module) page. -->
<script type="text/plain" id="app-source">
const { useState, useEffect, useRef } = React;

/* ---------------- icons ---------------- */
function Icon({ name, size = 18, color = 'currentColor', fill = 'none', strokeWidth = 2 }) {
  const c = { width: size, height: size, viewBox: '0 0 24 24', fill, stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'x': return <svg {...c}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>;
    case 'heart': return <svg {...c}><path d="M12 21s-1-.6-2.6-1.9C5.4 15.7 2 12.6 2 8.9 2 6.2 4.2 4 6.9 4c1.6 0 3.1.8 4.1 2.1C12 4.8 13.5 4 15.1 4 17.8 4 20 6.2 20 8.9c0 3.7-3.4 6.8-7.4 10.2C12 21 12 21 12 21z" /></svg>;
    case 'settings': return <svg {...c}><line x1="4" y1="6" x2="20" y2="6" /><circle cx="14" cy="6" r="2" fill={color} /><line x1="4" y1="12" x2="20" y2="12" /><circle cx="8" cy="12" r="2" fill={color} /><line x1="4" y1="18" x2="20" y2="18" /><circle cx="16" cy="18" r="2" fill={color} /></svg>;
    case 'arrow-left': return <svg {...c}><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>;
    case 'plus': return <svg {...c}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>;
    case 'trash': return <svg {...c}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1.2 14a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 6" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>;
    case 'pencil': return <svg {...c}><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>;
    case 'rotate': return <svg {...c}><path d="M3 12a9 9 0 1 0 2.6-6.3L3 8" /><polyline points="3 3 3 8 8 8" /></svg>;
    case 'image': return <svg {...c}><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="9" cy="9" r="1.5" fill={color} /><path d="M21 15l-5-5-9 9" /></svg>;
    case 'download': return <svg {...c}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>;
    case 'upload': return <svg {...c}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></svg>;
    case 'send': return <svg {...c}><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>;
    case 'copy': return <svg {...c}><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></svg>;
    case 'chevron': return <svg {...c}><polyline points="9 18 15 12 9 6" /></svg>;
    case 'undo': return <svg {...c}><path d="M3 7v6h6" /><path d="M3 13a9 9 0 1 0 3-7.7L3 8" /></svg>;
    case 'cloud': return <svg {...c}><path d="M17.5 19a4.5 4.5 0 0 0 .5-9 6 6 0 0 0-11.6-1.5A4 4 0 0 0 6.5 19Z" /></svg>;
    case 'message': return <svg {...c}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z" /></svg>;
    case 'flag': return <svg {...c}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1Z" /><line x1="4" y1="22" x2="4" y2="15" /></svg>;
    default: return null;
  }
}

/* ---------------- helpers ---------------- */
function readableText(hex) {
  const h = (hex || '').replace('#', '');
  if (h.length !== 6) return '#2B2520';
  const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.6 ? '#2B2520' : '#FBF6EE';
}
function slug(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 24) || 'item'; }
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
const NEW_TAG_PALETTE = ['#8C9A6B', '#7C6A8A', '#3F6B6B', '#A85751', '#C9A227', '#5E7A6C', '#9C7B52', '#46423C'];
function download(filename, text) {
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ---------------- defaults ---------------- */
const DEFAULT_CATEGORIES = [
  { key: 'scandinavian', label: 'Scandinavian', color: '#E4DCC9', desc: 'Light wood, soft neutrals, and clean lines. Calm, functional, and a little cozy.' },
  { key: 'industrial', label: 'Industrial', color: '#46423C', desc: 'Raw metal, exposed wood, and visible structure. Built with a workshop edge.' },
  { key: 'bohemian', label: 'Bohemian', color: '#C0744A', desc: 'Layered textures, global patterns, and warm color. Collected over time, not all at once.' },
  { key: 'midcentury', label: 'Mid-Century Modern', color: '#5E7A6C', desc: 'Tapered legs, warm walnut, and gentle curves. Retro shapes that still feel current.' },
  { key: 'rustic', label: 'Rustic & Farmhouse', color: '#9C7B52', desc: 'Reclaimed wood, worn finishes, and handcrafted joints. Furniture with some history in it.' },
  { key: 'minimalist', label: 'Minimalist', color: '#F2EEE6', desc: 'Pared-back forms and quiet color. Pieces that earn their place in the room.' },
  { key: 'traditional', label: 'Traditional', color: '#5A352E', desc: 'Rich wood tones and classic silhouettes. Built to be passed down.' },
  { key: 'maximalist', label: 'Maximalist & Eclectic', color: '#CE9A33', desc: 'Bold color, mixed pattern, and fearless pairings. A room that tells a story all at once.' },
  { key: 'coastal', label: 'Coastal', color: '#A9C4CE', desc: 'Breezy, light, and relaxed. Pale woods, soft blues, and natural fibers.' },
  { key: 'japandi', label: 'Japandi', color: '#B7AC97', desc: 'Japanese restraint meets Scandinavian warmth. Low, quiet, and natural.' },
  { key: 'artdeco', label: 'Art Deco', color: '#2F4858', desc: 'Bold geometry, rich contrast, and metallic accents. Glamour with structure.' },
  { key: 'contemporary', label: 'Contemporary', color: '#8A8782', desc: 'Current, neutral, and uncluttered. Of-the-moment without chasing a single era.' },
];
const STARTER = {
  scandinavian: ['Pale Oak Lounge Chair', 'Light Birch Sideboard', 'Linen-Wrapped Sofa'],
  industrial: ['Blackened Steel Shelving', 'Reclaimed Pipe Table', 'Riveted Leather Stool'],
  bohemian: ['Rattan Peacock Chair', 'Patterned Kilim Pouf', 'Macrame Wall Hanging'],
  midcentury: ['Tapered-Leg Armchair', 'Walnut Credenza', 'Atomic-Era Pendant Lamp'],
  rustic: ['Reclaimed Plank Table', 'Wrought-Iron Floor Lamp', 'Slipcovered Sofa'],
  minimalist: ['Bare Oak Bench', 'Concrete Stool', 'Unadorned White Cabinet'],
  traditional: ['Tufted Wingback Chair', 'Carved Mahogany Bookcase', 'Damask Ottoman'],
  maximalist: ['Velvet Jewel-Tone Sofa', 'Mixed-Pattern Armchair', 'Gallery Wall Console'],
};
function starterPieces(prefix, keys) {
  let pieces = [], n = 1;
  keys.forEach((k) => (STARTER[k] || []).forEach((name) => { pieces.push({ id: `${prefix}${String(n).padStart(2, '0')}`, name, imageUrl: '', tags: [k] }); n++; }));
  return pieces;
}
const LIVING_TAGS = ['scandinavian', 'industrial', 'bohemian', 'midcentury', 'rustic', 'minimalist', 'traditional', 'maximalist'];
const DEFAULT_STATE = {
  version: 3,
  // baked-in hosted source: every visitor auto-loads these rooms, no admin setup needed
  manifestUrl: 'https://nuninhosousa25.github.io/Furniture_style/manifest.json',
  destinationEmail: '',
  businessName: 'our team',
  categories: DEFAULT_CATEGORIES,
  quizzes: [{ id: 'q-living', name: 'Living Room', file: 'living-room.json', pieces: starterPieces('lr', LIVING_TAGS) }],
};
const STORAGE_KEY = 'furnitureStyleQuizState_v3';

/* ---------------- deep links ----------------
   ?room=<id|slug>  jumps a client straight into that room and hides the gear.
   ?dev=true        reveals the gear icon so you can open the admin area.
   nothing set      shows the normal room picker with no admin access.
   This hides admin from clients; it is not hard security (the admin area only
   edits a local browser copy and downloads files, it cannot change hosted content). */
const URL_PARAMS = new URLSearchParams(typeof window !== 'undefined' ? window.location.search : '');
const ROOM_PARAM = URL_PARAMS.get('room');
const DEV_MODE = URL_PARAMS.get('dev') === 'true';
function findQuizByParam(quizzes, param) {
  if (!param) return null;
  const p = param.trim().toLowerCase();
  return quizzes.find((q) => (q.id || '').toLowerCase() === p)
    || quizzes.find((q) => slug(q.name) === p)
    || null;
}

/* Minimum number of pieces a client must react to before they can stop early.
   The quiz never asks for more than the total pieces in the room, and the
   order is randomised every run. */
const MIN_QUESTIONS = 20;

const ACTIONS = [
  { key: 'superDislike', label: 'Never', stamp: 'NEVER', delta: -2, color: 'var(--ink)', icon: 'x', badge: true },
  { key: 'dislike', label: 'Pass', stamp: 'PASS', delta: -1, color: 'var(--rust)', icon: 'x', badge: false },
  { key: 'like', label: 'Like', stamp: 'LIKE', delta: 1, color: 'var(--sage)', icon: 'heart', badge: false },
  { key: 'superLike', label: 'Love it', stamp: 'LOVE IT', delta: 2, color: 'var(--brass)', icon: 'heart', badge: true },
];
const EXIT_CLASS = { superDislike: 'exit-left-strong', dislike: 'exit-left', like: 'exit-right', superLike: 'exit-right-strong' };
const sign = (v) => (v >= 0 ? '+' : '') + v;

/* ---------------- remote loading ---------------- */
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return res.json();
}
async function loadFromManifest(manifestUrl) {
  const m = await fetchJson(manifestUrl);
  const rooms = Array.isArray(m.rooms) ? m.rooms : [];
  if (!rooms.length) throw new Error('Manifest has no "rooms" array.');
  const quizzes = [];
  for (const r of rooms) {
    const fileUrl = new URL(r.file, manifestUrl).href;
    const rd = await fetchJson(fileUrl);
    quizzes.push({ id: r.id || ('q-' + slug(r.name)), name: r.name || rd.name || 'Quiz', file: r.file, pieces: Array.isArray(rd.pieces) ? rd.pieces : [] });
  }
  return {
    categories: Array.isArray(m.categories) && m.categories.length ? m.categories : DEFAULT_CATEGORIES,
    quizzes,
    businessName: m.businessName,
    destinationEmail: m.destinationEmail,
  };
}

/* ---------------- card ---------------- */
function CardFace({ card, catMap, forceFit, onAspect }) {
  const cat = catMap[card.tags[0]] || { color: '#E4DCC9' };
  const text = cat.text || readableText(cat.color);
  const [imgFailed, setImgFailed] = useState(false);
  // vertical images fill the card; anything wider (landscape/square) is scaled to fit so it isn't cropped
  const [fit, setFit] = useState('cover');
  useEffect(() => { setImgFailed(false); setFit('cover'); }, [card.imageUrl]);
  const onImgLoad = (e) => { const { naturalWidth: w, naturalHeight: h } = e.target; setFit(w > h ? 'contain' : 'cover'); if (onAspect && w && h) onAspect(w / h); };
  const showImage = card.imageUrl && !imgFailed;
  return (
    <div className="absolute inset-0 rounded-3xl overflow-hidden shadow-xl" style={{ background: cat.color }}>
      {showImage ? (
        <img src={card.imageUrl} alt={card.name} draggable={false} className="w-full h-full select-none" style={{ objectFit: forceFit || fit, pointerEvents: 'none', WebkitUserDrag: 'none' }} onLoad={onImgLoad} onError={() => setImgFailed(true)} />
      ) : (
        <div className="w-full h-full flex flex-col items-center justify-center gap-3 px-8 text-center">
          <Icon name="image" size={56} strokeWidth={1.25} color={text} />
          <span className="font-mono" style={{ fontSize: '11px', color: text, opacity: 0.6 }}>NO PHOTO YET</span>
        </div>
      )}
      {card.name && (
        <div className="absolute bottom-0 left-0 right-0 px-5 py-4" style={{ background: showImage ? 'linear-gradient(to top, rgba(20,16,12,0.78), rgba(20,16,12,0))' : 'rgba(0,0,0,0.06)' }}>
          <p className="font-display text-xl leading-snug" style={{ color: showImage ? '#FBF6EE' : text }}>{card.name}</p>
        </div>
      )}
    </div>
  );
}
function StampOverlay({ action }) {
  if (!action) return null;
  const a = ACTIONS.find((x) => x.key === action);
  return (
    <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
      <div className="stamp font-display text-3xl sm:text-4xl font-bold px-6 py-2 border-4 rounded-xl tracking-wide" style={{ color: a.color, borderColor: a.color, transform: 'rotate(-10deg)' }}>{a.stamp}</div>
    </div>
  );
}
function QuizView({ pieces, index, onAction, onUndo, canUndo, exiting, catMap, minRequired, note, setNote, onStop, isDesktop, vw, vh }) {
  const card = pieces[index], next = pieces[index + 1];
  const total = pieces.length;
  const progress = Math.round((index / total) * 100);
  // they have already reacted to `index` pieces; they may stop once that meets the minimum
  const canStop = total > minRequired && index >= minRequired;

  // On desktop the card frame follows each photo's shape, so nothing letterboxes or crops.
  // Mobile keeps the fixed portrait card. Placeholder (no photo) cards default to portrait.
  const PORTRAIT = 0.8;
  const [aspect, setAspect] = useState(PORTRAIT);
  useEffect(() => { if (!card || !card.imageUrl) setAspect(PORTRAIT); }, [card && card.id]);

  // drag-to-swipe, one code path for mouse (PC) and touch (mobile) via Pointer Events.
  // right = like / love it, left = pass / never; the further you drag, the stronger the action.
  const frameRef = useRef(null);
  const dragSt = useRef(null);
  const [drag, setDrag] = useState({ x: 0, y: 0, active: false });
  // clear any offset the instant a new card mounts, before paint, so it never flashes in
  React.useLayoutEffect(() => { setDrag({ x: 0, y: 0, active: false }); dragSt.current = null; }, [card && card.id]);
  const thresholds = () => { const w = frameRef.current ? frameRef.current.getBoundingClientRect().width : 320; return { normal: Math.max(70, w * 0.22), strong: Math.max(160, w * 0.55) }; };
  const actionFor = (dx, strong) => dx > 0 ? (dx >= strong ? 'superLike' : 'like') : (dx <= -strong ? 'superDislike' : 'dislike');
  const onPointerDown = (e) => { if (exiting) return; dragSt.current = { id: e.pointerId, sx: e.clientX, sy: e.clientY }; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {} setDrag({ x: 0, y: 0, active: true }); };
  const onPointerMove = (e) => { const d = dragSt.current; if (!d || d.id !== e.pointerId) return; setDrag({ x: e.clientX - d.sx, y: e.clientY - d.sy, active: true }); };
  const endDrag = (e) => {
    const d = dragSt.current; if (!d) return; dragSt.current = null;
    const dx = e.clientX != null ? e.clientX - d.sx : drag.x;
    const { normal, strong } = thresholds();
    const key = Math.abs(dx) >= normal ? actionFor(dx, strong) : null;
    setDrag({ x: 0, y: 0, active: false });
    if (key) onAction(ACTIONS.find((a) => a.key === key));
  };
  // live stamp while dragging, fading in with distance
  let preview = null, previewOpacity = 0;
  if (drag.active && Math.abs(drag.x) > 8) {
    const { normal, strong } = thresholds();
    preview = ACTIONS.find((a) => a.key === actionFor(drag.x, strong));
    previewOpacity = Math.min(1, Math.abs(drag.x) / normal);
  }
  // the card frame fits each photo's shape on every screen size, so landscape photos
  // get a short wide card and portrait photos a tall one, with no letterboxing.
  const maxW = isDesktop ? 700 : Math.min(384, (vw || 384) - 32);
  const maxH = isDesktop ? Math.min(620, Math.round((vh || 800) * 0.72)) : Math.min(520, Math.round((vh || 800) * 0.62));
  let fw, fh;
  if (maxW / maxH < aspect) { fw = maxW; fh = Math.round(maxW / aspect); }  // width-bound (landscape)
  else { fh = maxH; fw = Math.round(maxH * aspect); }                       // height-bound (portrait)
  const frame = { width: fw + 'px', height: fh + 'px', transition: 'width .25s ease, height .25s ease' };
  const outerStyle = { width: fw + 'px' };
  const outerClass = '';

  return (
    <div className={`${outerClass} flex flex-col items-center mx-auto`} style={outerStyle}>
      <div className="w-full flex items-center justify-between mb-3 px-1">
        <span className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>PIECE {index + 1} / {total}</span>
        <button onClick={onUndo} disabled={!canUndo || !!exiting} className="font-mono text-xs flex items-center gap-1 disabled:opacity-30" aria-label="Undo last">
          <Icon name="undo" size={13} /> UNDO
        </button>
      </div>
      <div className="w-full h-1.5 rounded-full mb-5 overflow-hidden" style={{ background: 'rgba(43,37,32,0.12)' }}>
        <div className="h-full rounded-full transition-all duration-300" style={{ width: `${progress}%`, background: 'var(--brass)' }} />
      </div>
      <div ref={frameRef} className="relative" style={frame}>
        {next && <div className="absolute inset-0 scale-95 translate-y-3 opacity-60"><CardFace card={next} catMap={catMap} forceFit="cover" /></div>}
        <div
          className={`absolute inset-0 select-none ${exiting ? EXIT_CLASS[exiting] : ''}`}
          onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={endDrag} onPointerCancel={endDrag}
          style={{ transform: `translate(${drag.x}px, ${drag.y}px) rotate(${drag.x * 0.05}deg)`, transition: drag.active ? 'none' : 'transform .2s ease', touchAction: 'none', cursor: drag.active ? 'grabbing' : 'grab' }}
        >
          <CardFace card={card} catMap={catMap} onAspect={setAspect} />
          <StampOverlay action={exiting} />
          {!exiting && preview && (
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
              <div className="font-display text-3xl sm:text-4xl font-bold px-6 py-2 border-4 rounded-xl tracking-wide" style={{ color: preview.color, borderColor: preview.color, transform: `rotate(${drag.x > 0 ? -10 : 10}deg)`, opacity: previewOpacity }}>{preview.stamp}</div>
            </div>
          )}
        </div>
      </div>
      <div className="w-full mt-5 flex items-center gap-2">
        <span style={{ opacity: 0.4 }}><Icon name="message" size={15} /></span>
        <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Add a note (optional), e.g. love the colour" className="field" style={{ fontSize: '13px' }} />
      </div>
      <div className="grid grid-cols-4 gap-3 w-full mt-4">
        {ACTIONS.map((a) => (
          <button key={a.key} onClick={() => onAction(a)} disabled={!!exiting} aria-label={a.label} className="flex flex-col items-center justify-center gap-1 rounded-2xl py-3 border transition-transform active:scale-95 disabled:opacity-50" style={{ borderColor: a.color, color: a.color, background: 'var(--card)' }}>
            <span className="relative">
              <Icon name={a.icon} size={22} color={a.color} fill={a.key === 'superLike' || a.key === 'like' ? a.color : 'none'} />
              {a.badge && <span className="absolute -top-1 -right-2 font-mono font-bold" style={{ color: a.color, fontSize: '10px' }}>x2</span>}
            </span>
            <span className="font-mono tracking-wide" style={{ fontSize: '10px' }}>{a.label}</span>
          </button>
        ))}
      </div>
      {canStop && (
        <button onClick={onStop} disabled={!!exiting} className="tag-button mt-6 disabled:opacity-50">
          <Icon name="flag" size={14} color="var(--card)" /> Stop &amp; see my results ({index} answered)
        </button>
      )}
    </div>
  );
}

/* ---------------- detailed responses (for the technicians) ---------------- */
function DetailedResponses({ responses, catMap }) {
  if (!responses.length) return null;
  const noteCount = responses.filter((r) => r.note).length;
  // strongest reaction first (Love it, Like, Pass, Never), keeping show order within a tie
  const ordered = [...responses].sort((a, b) => b.delta - a.delta);
  return (
    <div className="w-full">
      <p className="font-mono text-xs tracking-widest mb-3" style={{ opacity: 0.6 }}>EVERY REACTION ({responses.length}{noteCount ? `, ${noteCount} with notes` : ''})</p>
      <div className="flex flex-col gap-2">
        {ordered.map((r, i) => {
          const a = ACTIONS.find((x) => x.key === r.actionKey) || { color: 'var(--ink)' };
          const sw = catMap[r.tags[0]] || { color: '#E4DCC9' };
          const tagLabels = r.tags.map((t) => catMap[t]?.label || t).join(', ');
          return (
            <div key={i} className="rounded-xl p-3 flex items-start gap-3" style={{ background: 'var(--card)' }}>
              <div className="w-9 h-9 rounded-lg flex-shrink-0 overflow-hidden" style={{ background: sw.color }}>
                {r.imageUrl ? <img src={r.imageUrl} alt="" className="w-full h-full object-cover" /> : null}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between gap-2">
                  <p className="text-sm font-medium truncate">{i + 1}. {r.pieceName || 'Untitled piece'}</p>
                  <span className="font-mono flex-shrink-0" style={{ color: a.color, fontSize: '11px' }}>{r.actionLabel} ({sign(r.delta)})</span>
                </div>
                {tagLabels && <p className="text-xs truncate" style={{ opacity: 0.55 }}>{tagLabels}</p>}
                {r.note && <p className="text-sm mt-1 leading-snug" style={{ color: 'var(--ink)' }}>&ldquo;{r.note}&rdquo;</p>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------- results + share ---------------- */
function ResultsView({ scores, counts, usedKeys, responses, catMap, quizName, destinationEmail, businessName, onRestart }) {
  const [clientName, setClientName] = useState('');
  const [copied, setCopied] = useState(false);
  // average affinity per category, range about -2..+2, so volume does not bias the result
  const cats = usedKeys.map((k) => catMap[k]).filter(Boolean).map((c) => {
    const cnt = counts[c.key] || 0;
    const avg = cnt ? (scores[c.key] || 0) / cnt : 0;
    return { ...c, avg, cnt };
  });
  const ranked = [...cats].sort((a, b) => b.avg - a.avg);
  const top = ranked[0];
  const second = ranked[1];
  const showSecond = second && second.avg > 0 && top.avg - second.avg <= 0.5;

  const fmt = (v) => (v >= 0 ? '+' : '') + v.toFixed(1);
  const buildSummary = () => {
    const lines = [`Style quiz result, ${quizName}`];
    if (clientName.trim()) lines.push(`From: ${clientName.trim()}`);
    lines.push(`Pieces reviewed: ${responses.length}`);
    if (top) lines.push(`Top style: ${top.label} (${fmt(top.avg)})`);
    if (showSecond) lines.push(`Also leans: ${second.label} (${fmt(second.avg)})`);
    lines.push('', 'Affinity by style (average reaction, -2 to +2):');
    ranked.forEach((s) => lines.push(`- ${s.label}: ${fmt(s.avg)} (over ${s.cnt} piece${s.cnt === 1 ? '' : 's'})`));
    lines.push('', 'Detailed responses, strongest reaction first:');
    [...responses].sort((a, b) => b.delta - a.delta).forEach((r, i) => {
      const tagLabels = r.tags.map((t) => catMap[t]?.label || t).join(', ');
      lines.push(`${i + 1}. ${r.pieceName || 'Untitled piece'} — ${r.actionLabel} (${sign(r.delta)})${tagLabels ? ` [${tagLabels}]` : ''}`);
      if (r.note) lines.push(`   Note: ${r.note}`);
    });
    return lines.join('\n');
  };
  const sendEmail = () => {
    const subject = `Style quiz result${clientName.trim() ? ` from ${clientName.trim()}` : ''}, ${quizName}`;
    window.location.href = `mailto:${encodeURIComponent(destinationEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(buildSummary())}`;
  };
  const nativeShare = async () => { try { await navigator.share({ title: `Style quiz result, ${quizName}`, text: buildSummary() }); } catch (e) {} };
  const copy = async () => { try { await navigator.clipboard.writeText(buildSummary()); setCopied(true); setTimeout(() => setCopied(false), 1800); } catch (e) {} };

  const shareRow = (
    <div className="w-full rounded-2xl p-4 flex flex-col gap-3" style={{ background: 'var(--card)' }}>
      <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>SEND THIS TO {(businessName || 'US').toUpperCase()}</p>
      <input value={clientName} onChange={(e) => setClientName(e.target.value)} placeholder="Your name (optional)" className="field" />
      <div className="flex flex-wrap gap-2">
        {destinationEmail && <button onClick={sendEmail} className="tag-button"><Icon name="send" size={15} color="var(--card)" /> Send to us</button>}
        {typeof navigator !== 'undefined' && navigator.share && <button onClick={nativeShare} className="ghost-button"><Icon name="upload" size={14} /> Share</button>}
        <button onClick={copy} className="ghost-button"><Icon name="copy" size={14} /> {copied ? 'Copied' : 'Copy result'}</button>
      </div>
      {!destinationEmail && <p className="text-xs" style={{ opacity: 0.55 }}>Tip: set your email under Manage so a "Send to us" button appears here.</p>}
      <p className="text-xs" style={{ opacity: 0.55 }}>The message includes every reaction and note so the team can read your taste piece by piece.</p>
    </div>
  );

  if (!top || top.avg <= 0) {
    return (
      <div className="w-full max-w-xs flex flex-col items-center text-center gap-6">
        <div className="flex flex-col items-center gap-3">
          <p className="font-display text-2xl">Nothing quite landed</p>
          <p className="text-sm" style={{ opacity: 0.75 }}>That's useful too. Send this to {businessName} and we'll start from scratch with you, your notes still help.</p>
          <button onClick={onRestart} className="ghost-button mt-1"><Icon name="rotate" size={14} /> Try again</button>
        </div>
        <DetailedResponses responses={responses} catMap={catMap} />
        {shareRow}
      </div>
    );
  }
  return (
    <div className="w-full max-w-xs flex flex-col items-center gap-6">
      <div className="text-center">
        <p className="font-mono text-xs tracking-widest mb-2" style={{ opacity: 0.6 }}>YOUR STYLE PROFILE, {quizName.toUpperCase()}</p>
        <p className="font-display text-3xl">{top.label}</p>
      </div>
      <div className="w-full rounded-2xl p-5 relative overflow-hidden shadow-lg" style={{ background: top.color, color: top.text || readableText(top.color) }}>
        <div className="absolute left-1/2 -translate-x-1/2 top-4 w-4 h-4 rounded-full" style={{ background: '#FBF8F2', boxShadow: 'inset 0 1px 3px rgba(0,0,0,0.3)' }} />
        <p className="mt-6 text-sm leading-relaxed">{top.desc}</p>
      </div>
      {showSecond && <p className="text-sm text-center" style={{ opacity: 0.8 }}>You also lean toward <span className="font-semibold">{second.label}</span>.</p>}
      <div className="w-full">
        <p className="font-mono text-xs tracking-widest mb-3" style={{ opacity: 0.6 }}>AFFINITY BY STYLE</p>
        <div className="flex flex-col gap-2">
          {ranked.map((s) => {
            const width = s.avg > 0 ? `${Math.max(6, (s.avg / 2) * 100)}%` : '2%';
            return (
              <div key={s.key} className="flex items-center gap-2">
                <span className="font-mono w-32 truncate" style={{ fontSize: '11px' }} title={s.label}>{s.label}</span>
                <div className="flex-1 h-2.5 rounded-full overflow-hidden" style={{ background: 'rgba(43,37,32,0.10)' }}>
                  <div className="h-full rounded-full" style={{ width, background: s.color }} />
                </div>
                <span className="font-mono w-8 text-right" style={{ opacity: 0.6, fontSize: '11px' }}>{fmt(s.avg)}</span>
              </div>
            );
          })}
        </div>
      </div>
      <DetailedResponses responses={responses} catMap={catMap} />
      {shareRow}
      <button onClick={onRestart} className="ghost-button"><Icon name="rotate" size={14} /> Take it again</button>
    </div>
  );
}

/* ---------------- small inputs ---------------- */
function BlurInput({ value, onCommit, placeholder, type }) {
  const [v, setV] = useState(value || '');
  useEffect(() => { setV(value || ''); }, [value]);
  return <input type={type || 'text'} value={v} onChange={(e) => setV(e.target.value)} onBlur={() => onCommit(v)} placeholder={placeholder} className="field" />;
}
function Section({ label, children }) {
  return (
    <div className="rounded-2xl p-4 flex flex-col gap-3" style={{ background: 'var(--card)' }}>
      <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>{label}</p>
      {children}
    </div>
  );
}

        <button onClick={onReset} className="ghost-button"><Icon name="rotate" size={14} /> Reset everything</button>
      </div>
    </div>
  );
}

/* ---------------- app ---------------- */

  const [view, setView] = useState('picker');
  const [activeQuizId, setActiveQuizId] = useState(null);
  const [runQuiz, setRunQuiz] = useState(null);
  const [index, setIndex] = useState(0);
  const [scores, setScores] = useState({});
  const [history, setHistory] = useState([]);
  const [note, setNote] = useState('');
  const [exiting, setExiting] = useState(null);
  const [error, setError] = useState(null);
  const [remote, setRemote] = useState({ loading: false, error: null });
  const [vp, setVp] = useState(() => ({ w: typeof window !== 'undefined' ? window.innerWidth : 1024, h: typeof window !== 'undefined' ? window.innerHeight : 768 }));
  const didInit = useRef(false);

  const persist = (next) => {
    setState(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); setError(null); }
    catch (e) { setError('Could not cache locally. Edits may be lost on reload.'); }
  };

  const applyRemote = (base, data) => {
    const next = {
      ...base,
      categories: data.categories,
      quizzes: data.quizzes,
      businessName: data.businessName != null ? data.businessName : base.businessName,
      destinationEmail: data.destinationEmail != null ? data.destinationEmail : base.destinationEmail,
    };
    persist(next);
    setActiveQuizId(next.quizzes[0] ? next.quizzes[0].id : null);
    return next;
  };

  const doLoadRemote = async (url) => {
    setRemote({ loading: true, error: null });
    try {
      const data = await loadFromManifest(url);
      const base = (state || DEFAULT_STATE);
      applyRemote({ ...base, manifestUrl: url }, data);
      setRemote({ loading: false, error: null });
      setView('picker');
    } catch (e) {
      setRemote({ loading: false, error: `Could not load: ${e.message}. Check the URL and CORS settings.` });
    }
  };

  useEffect(() => {
    if (didInit.current) return; didInit.current = true;
    let s = DEFAULT_STATE;
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) { const p = JSON.parse(stored); if (p && p.version === 3 && Array.isArray(p.quizzes) && p.quizzes.length) s = p; }
    } catch (e) {}
    setState(s);
    setActiveQuizId(s.quizzes[0].id);
    // a ?room= link jumps straight into that room once its pieces are ready
    const autoStart = (quizzes) => { const q = findQuizByParam(quizzes, ROOM_PARAM); if (q) beginQuiz(q); };
    if (s.manifestUrl) {
      // refresh from hosted source on load, fall back to cached copy on failure
      (async () => {
        setRemote({ loading: true, error: null });
        try { const data = await loadFromManifest(s.manifestUrl); const next = applyRemote(s, data); setRemote({ loading: false, error: null }); autoStart(next.quizzes); }
        catch (e) { setRemote({ loading: false, error: `Using cached copy. Live load failed: ${e.message}` }); autoStart(s.quizzes); }
      })();
    } else {
      autoStart(s.quizzes);
    }
  }, []);

  // track viewport so the desktop card can size itself to each photo
  useEffect(() => {
    const onResize = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const catMap = state ? Object.fromEntries(state.categories.map((c) => [c.key, c])) : {};
  const beginQuiz = (q) => { if (!q.pieces.length) return; setRunQuiz({ ...q, pieces: shuffle(q.pieces) }); setIndex(0); setScores({}); setHistory([]); setNote(''); setExiting(null); setView('quiz'); };

  const handleAction = (action) => {
    if (exiting || !runQuiz) return;
    setExiting(action.key);
    const currentNote = note.trim();
    setTimeout(() => {
      const card = runQuiz.pieces[index];
      const applied = {};
      setScores((prev) => { const n = { ...prev }; card.tags.forEach((t) => { n[t] = (n[t] || 0) + action.delta; applied[t] = (applied[t] || 0) + action.delta; }); return n; });
      // a full record of this reaction, so the team can read the run piece by piece
      const response = { pieceId: card.id, pieceName: card.name, imageUrl: card.imageUrl, tags: [...card.tags], actionKey: action.key, actionLabel: action.label, delta: action.delta, note: currentNote };
      setHistory((h) => [...h, { index, applied, response }]);
      setNote('');
      if (index + 1 >= runQuiz.pieces.length) setView('results');
      else setIndex((i) => i + 1);
      setExiting(null);
    }, 300);
  };
  const handleUndo = () => {
    if (exiting || history.length === 0) return;
    const last = history[history.length - 1];
    setScores((prev) => { const n = { ...prev }; Object.entries(last.applied).forEach(([k, v]) => { n[k] = (n[k] || 0) - v; }); return n; });
    setHistory((h) => h.slice(0, -1));
    setIndex(last.index);
    setNote(last.response ? last.response.note : '');
  };
  const handleStop = () => { if (exiting) return; setView('results'); };

  const updateQuiz = (qid, fn) => persist({ ...state, quizzes: state.quizzes.map((q) => q.id === qid ? fn(q) : q) });
  const onAddPiece = (qid, piece) => updateQuiz(qid, (q) => ({ ...q, pieces: [...q.pieces, piece] }));
  const onDeletePiece = (qid, pid) => updateQuiz(qid, (q) => ({ ...q, pieces: q.pieces.filter((p) => p.id !== pid) }));
  const onUpdatePiece = (qid, pid, patch) => updateQuiz(qid, (q) => ({ ...q, pieces: q.pieces.map((p) => p.id === pid ? { ...p, ...patch } : p) }));
  const onTogglePieceTag = (qid, pid, key) => updateQuiz(qid, (q) => ({ ...q, pieces: q.pieces.map((p) => p.id === pid ? { ...p, tags: p.tags.includes(key) ? p.tags.filter((t) => t !== key) : [...p.tags, key] } : p) }));
  const onAddQuiz = (name) => { const id = `q-${Date.now()}`; persist({ ...state, quizzes: [...state.quizzes, { id, name, file: `${slug(name)}.json`, pieces: [] }] }); setActiveQuizId(id); };
  const onRenameQuiz = (qid, name) => updateQuiz(qid, (q) => ({ ...q, name, file: q.file || `${slug(name)}.json` }));
  const onDeleteQuiz = (qid) => { const rest = state.quizzes.filter((q) => q.id !== qid); persist({ ...state, quizzes: rest }); if (activeQuizId === qid) setActiveQuizId(rest[0].id); };
  const onAddCategory = (cat) => persist({ ...state, categories: [...state.categories, cat] });
  const onDeleteCategory = (key) => persist({ ...state, categories: state.categories.filter((c) => c.key !== key), quizzes: state.quizzes.map((q) => ({ ...q, pieces: q.pieces.map((p) => ({ ...p, tags: p.tags.filter((t) => t !== key) })) })) });
  const onSet = (patch) => persist({ ...state, ...patch });

  const onImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const p = JSON.parse(ev.target.result);
        if (p && p.version === 3 && Array.isArray(p.quizzes) && p.quizzes.length && Array.isArray(p.categories)) { persist(p); setActiveQuizId(p.quizzes[0].id); }
        else setError('That file does not look like a full config export.');
      } catch (err) { setError('Could not read that file.'); }
    };
    reader.readAsText(file); e.target.value = '';
  };
  const onResetAll = () => { if (confirm('Reset everything to the starter setup? This clears the hosted source link too.')) { persist(DEFAULT_STATE); setActiveQuizId(DEFAULT_STATE.quizzes[0].id); setRemote({ loading: false, error: null }); } };

  if (!state) return <div style={{ minHeight: '100vh', background: '#EAE2D3' }} />;
  // scoring is built from the pieces actually answered, so an early stop is fair
  const responses = history.map((h) => h.response).filter(Boolean);
  const counts = {};
  responses.forEach((r) => r.tags.forEach((t) => { counts[t] = (counts[t] || 0) + 1; }));
  const usedKeys = [...new Set(responses.flatMap((r) => r.tags))];
  const minRequired = runQuiz ? Math.min(MIN_QUESTIONS, runQuiz.pieces.length) : 0;
  const isDesktop = vp.w >= 768;

  return (
    <div className="min-h-screen w-full flex flex-col items-center px-4 py-6 relative" style={{ '--canvas': '#EAE2D3', '--ink': '#2B2520', '--card': '#FBF8F2', '--sage': '#6E7F5C', '--rust': '#B2603F', '--brass': '#C9A227', background: 'var(--canvas)', color: 'var(--ink)', fontFamily: "'Work Sans', sans-serif" }}>
      {(!isDesktop || view === 'admin') ? (
        <div className="w-full max-w-md flex items-center justify-between mb-6">
          <div className="flex items-center gap-2">
            <div className="w-4 h-4 rounded" style={{ background: 'var(--brass)' }} />
            <span className="font-display text-lg">Find Your Style</span>
          </div>
          {view === 'admin'
            ? <button onClick={() => setView('picker')} className="p-2 rounded-lg" style={{ background: 'var(--card)' }} aria-label="Back"><Icon name="arrow-left" size={16} /></button>
            : DEV_MODE
              ? <button onClick={() => setView('admin')} className="p-2 rounded-lg" style={{ background: 'var(--card)' }} aria-label="Manage"><Icon name="settings" size={16} /></button>
              : null}
        </div>
      ) : (
        // desktop client view: hide the header for more vertical room; float the gear for dev only
        DEV_MODE
          ? <button onClick={() => setView('admin')} className="absolute top-4 right-4 p-2 rounded-lg z-10" style={{ background: 'var(--card)' }} aria-label="Manage"><Icon name="settings" size={16} /></button>
          : null
      )}

      {view === 'picker' ? (
        remote.loading ? (
          <p className="font-mono text-sm mt-10" style={{ opacity: 0.6 }}>Loading rooms from your hosted source...</p>
        ) : state.quizzes.length === 1 ? (
          (() => {
            const total = state.quizzes[0].pieces.length;
            const minN = Math.min(MIN_QUESTIONS, total);
            return (
              <div className="w-full max-w-xs flex flex-col items-center text-center gap-5 mt-6">
                <p className="font-display text-4xl leading-tight">What's your<br />style?</p>
                <p className="text-sm" style={{ opacity: 0.75 }}>{total > MIN_QUESTIONS
                  ? `Swipe through at least ${minN} of ${total} pieces in random order, then stop whenever you like. Tap how you feel about each one and add a note if you want.`
                  : `Swipe through ${total} piece${total === 1 ? '' : 's'} in random order. Tap how you feel about each one, add a note if you want, no rush, no right answers.`}</p>
                <div className="w-full grid grid-cols-2 gap-3 text-xs font-mono" style={{ opacity: 0.7 }}>
                  <div className="flex items-center gap-2 justify-center"><Icon name="x" size={14} /> Pass / Never</div>
                  <div className="flex items-center gap-2 justify-center"><Icon name="heart" size={14} /> Like / Love it</div>
                </div>
                <button onClick={() => beginQuiz(state.quizzes[0])} className="tag-button mt-2">Begin</button>
              </div>
            );
          })()
        ) : <PickerView quizzes={state.quizzes} onPick={beginQuiz} />
      ) : view === 'quiz' ? (
        <QuizView pieces={runQuiz.pieces} index={index} onAction={handleAction} onUndo={handleUndo} canUndo={history.length > 0} exiting={exiting} catMap={catMap} minRequired={minRequired} note={note} setNote={setNote} onStop={handleStop} isDesktop={isDesktop} vw={vp.w} vh={vp.h} />
      ) : view === 'results' ? (
        <ResultsView scores={scores} counts={counts} usedKeys={usedKeys} responses={responses} catMap={catMap} quizName={runQuiz.name} destinationEmail={state.destinationEmail} businessName={state.businessName || 'our team'} onRestart={() => setView('picker')} />
      ) : (
        <AdminView state={state} activeQuizId={activeQuizId} setActiveQuizId={setActiveQuizId} remote={remote} onLoadRemote={doLoadRemote}
          onAddPiece={onAddPiece} onTogglePieceTag={onTogglePieceTag} onDeletePiece={onDeletePiece} onUpdatePiece={onUpdatePiece}
          onAddQuiz={onAddQuiz} onRenameQuiz={onRenameQuiz} onDeleteQuiz={onDeleteQuiz}
          onAddCategory={onAddCategory} onDeleteCategory={onDeleteCategory}
          onSet={onSet} onImport={onImport} onReset={onResetAll} error={error} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // Compile the app source with the classic JSX runtime (React.createElement),
  // then run it as a normal global script. This is independent of which
  // @babel/standalone version the CDN serves.
  (function () {
    try {
      if (typeof Babel === 'undefined' || typeof React === 'undefined') {
        throw new Error('Could not load React/Babel from the CDN. Check your internet connection.');
      }
      var src = document.getElementById('app-source').textContent;
      var compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
      var s = document.createElement('script');
      s.textContent = compiled;
      document.body.appendChild(s);
    } catch (err) {
      // Surface the failure instead of leaving a blank page.
      document.getElementById('root').innerHTML =
        '<div style="max-width:28rem;margin:4rem auto;padding:0 1rem;font-family:sans-serif;color:#2B2520;text-align:center">' +
        '<p style="font-size:1.25rem;margin-bottom:.5rem">Could not start the quiz</p>' +
        '<p style="font-size:.875rem;opacity:.7">' + (err && err.message ? err.message : err) + '</p></div>';
      throw err;
    }
  })();
</script>
</body>
</html>
