<style>

  .ghost-button { display: inline-flex; align-items: center; gap: 6px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.1em; padding: 9px 15px; border-radius: 4px; border: 1px solid rgba(43,40,36,0.28); background: transparent; color: var(--ink); cursor: pointer; }
  .field { border-radius: 6px; padding: 9px 12px; border: 1px solid rgba(43,40,36,0.2); background: #fff; font-size: 14px; width: 100%; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
  .exit-left { animation: exitLeft 0.3s ease forwards; }
  .exit-left-strong { animation: exitLeftStrong 0.3s ease forwards; }
  .exit-right { animation: exitRight 0.3s ease forwards; }
  .exit-right-strong { animation: exitRightStrong 0.3s ease forwards; }
  @keyframes exitLeft { to { transform: translateX(-130%) rotate(-10deg); opacity: 0; } }
  @keyframes exitLeftStrong { to { transform: translateX(-170%) rotate(-22deg); opacity: 0; } }
  @keyframes exitRight { to { transform: translateX(130%) rotate(10deg); opacity: 0; } }
  @keyframes exitRightStrong { to { transform: translateX(170%) rotate(22deg); opacity: 0; } }
  .stamp { animation: stampIn 0.2s ease forwards; }
  @keyframes stampIn { from { opacity: 0; transform: scale(1.5) rotate(-10deg); } to { opacity: 1; transform: scale(1) rotate(-10deg); } }
  @media (prefers-reduced-motion: reduce) { .exit-left, .exit-left-strong, .exit-right, .exit-right-strong, .stamp { animation: none !important; } }
</style>

<div id="root"></div>

<!-- App source is compiled by Babel below with the classic JSX runtime.
     We do NOT use type="text/babel" auto-run: recent @babel/standalone builds
     default the react preset to the automatic runtime, which emits bare
     `import` statements that break in a plain (non-module) page. -->
<script type="text/plain" id="app-source">
const { useState, useEffect, useRef, useLayoutEffect, useMemo } = React;

/* ============================================================================
   Find Your Style — single-file React app (compiled in-browser by Babel below).
   Section map, top to bottom:
     icons · helpers · defaults/state · deep links · remote loading ·
     card + quiz (CardFace, StampOverlay, QuizView) · results (DetailedResponses,
     ResultsView) · picker · info button · shared inputs (BlurInput, Section,
     SwatchEditor) · master library + builder (LibraryManager) · admin (AdminView) ·
     App (state, routing) · ReactDOM render.
   When we split into index.html / index.css / index.js, the <style> block becomes
   the CSS and everything in #app-source becomes the JS.
   ============================================================================ */

/* ---------------- icons ---------------- */
function Icon({ name, size = 18, color = 'currentColor', fill = 'none', strokeWidth = 2 }) {
  const c = { width: size, height: size, viewBox: '0 0 24 24', fill, stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'x': return <svg {...c}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>;
    case 'heart': return <svg {...c}><path d="M12 21s-1-.6-2.6-1.9C5.4 15.7 2 12.6 2 8.9 2 6.2 4.2 4 6.9 4c1.6 0 3.1.8 4.1 2.1C12 4.8 13.5 4 15.1 4 17.8 4 20 6.2 20 8.9c0 3.7-3.4 6.8-7.4 10.2C12 21 12 21 12 21z" /></svg>;

    case 'plus': return <svg {...c}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>;
    case 'trash': return <svg {...c}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1.2 14a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 6" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>;

    case 'download': return <svg {...c}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>;

    case 'send': return <svg {...c}><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>;
    case 'copy': return <svg {...c}><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></svg>;
    case 'chevron': return <svg {...c}><polyline points="9 18 15 12 9 6" /></svg>;
    case 'undo': return <svg {...c}><path d="M3 7v6h6" /><path d="M3 13a9 9 0 1 0 3-7.7L3 8" /></svg>;
    case 'cloud': return <svg {...c}><path d="M17.5 19a4.5 4.5 0 0 0 .5-9 6 6 0 0 0-11.6-1.5A4 4 0 0 0 6.5 19Z" /></svg>;
    case 'message': return <svg {...c}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z" /></svg>;
    case 'flag': return <svg {...c}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1Z" /><line x1="4" y1="22" x2="4" y2="15" /></svg>;
    case 'info': return <svg {...c}><circle cx="12" cy="12" r="10" /><line x1="12" y1="11" x2="12" y2="16" /><line x1="12" y1="7.5" x2="12" y2="7.5" /></svg>;
    case 'no-entry': return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill={color} /><rect x="6" y="10.3" width="12" height="3.4" rx="0.6" fill="var(--card)" /></svg>;
    default: return null;
  }
}

/* ---------------- helpers ---------------- */
function readableText(hex) {
  const h = (hex || '').replace('#', '');
  if (h.length !== 6) return '#2B2520';
  const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.6 ? '#2B2520' : '#FBF6EE';
}
function slug(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 24) || 'item'; }
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
const NEW_TAG_PALETTE = ['#8C9A6B', '#7C6A8A', '#3F6B6B', '#A85751', '#C9A227', '#5E7A6C', '#9C7B52', '#46423C'];
function download(filename, text) {
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ---------------- defaults ---------------- */
const DEFAULT_CATEGORIES = [
  { key: 'scandinavian', label: 'Scandinavian', color: '#E4DCC9', desc: 'Light wood, soft neutrals, and clean lines. Calm, functional, and a little cozy.' },
  { key: 'industrial', label: 'Industrial', color: '#46423C', desc: 'Raw metal, exposed wood, and visible structure. Built with a workshop edge.' },
  { key: 'bohemian', label: 'Bohemian', color: '#C0744A', desc: 'Layered textures, global patterns, and warm color. Collected over time, not all at once.' },
  { key: 'midcentury', label: 'Mid-Century Modern', color: '#5E7A6C', desc: 'Tapered legs, warm walnut, and gentle curves. Retro shapes that still feel current.' },
  { key: 'rustic', label: 'Rustic & Farmhouse', color: '#9C7B52', desc: 'Reclaimed wood, worn finishes, and handcrafted joints. Furniture with some history in it.' },
  { key: 'minimalist', label: 'Minimalist', color: '#F2EEE6', desc: 'Pared-back forms and quiet color. Pieces that earn their place in the room.' },
  { key: 'traditional', label: 'Traditional', color: '#5A352E', desc: 'Rich wood tones and classic silhouettes. Built to be passed down.' },
  { key: 'maximalist', label: 'Maximalist & Eclectic', color: '#CE9A33', desc: 'Bold color, mixed pattern, and fearless pairings. A room that tells a story all at once.' },
  { key: 'coastal', label: 'Coastal', color: '#A9C4CE', desc: 'Breezy, light, and relaxed. Pale woods, soft blues, and natural fibers.' },
  { key: 'japandi', label: 'Japandi', color: '#B7AC97', desc: 'Japanese restraint meets Scandinavian warmth. Low, quiet, and natural.' },
  { key: 'artdeco', label: 'Art Deco', color: '#2F4858', desc: 'Bold geometry, rich contrast, and metallic accents. Glamour with structure.' },
  { key: 'contemporary', label: 'Contemporary', color: '#8A8782', desc: 'Current, neutral, and uncluttered. Of-the-moment without chasing a single era.' },
];
const STARTER = {
  scandinavian: ['Pale Oak Lounge Chair', 'Light Birch Sideboard', 'Linen-Wrapped Sofa'],
  industrial: ['Blackened Steel Shelving', 'Reclaimed Pipe Table', 'Riveted Leather Stool'],
  bohemian: ['Rattan Peacock Chair', 'Patterned Kilim Pouf', 'Macrame Wall Hanging'],
  midcentury: ['Tapered-Leg Armchair', 'Walnut Credenza', 'Atomic-Era Pendant Lamp'],
  rustic: ['Reclaimed Plank Table', 'Wrought-Iron Floor Lamp', 'Slipcovered Sofa'],
  minimalist: ['Bare Oak Bench', 'Concrete Stool', 'Unadorned White Cabinet'],
  traditional: ['Tufted Wingback Chair', 'Carved Mahogany Bookcase', 'Damask Ottoman'],
  maximalist: ['Velvet Jewel-Tone Sofa', 'Mixed-Pattern Armchair', 'Gallery Wall Console'],
};
function starterPieces(prefix, keys) {
  let pieces = [], n = 1;
  keys.forEach((k) => (STARTER[k] || []).forEach((name) => { pieces.push({ id: `${prefix}${String(n).padStart(2, '0')}`, name, imageUrl: '', tags: [k] }); n++; }));
  return pieces;
}
const LIVING_TAGS = ['scandinavian', 'industrial', 'bohemian', 'midcentury', 'rustic', 'minimalist', 'traditional', 'maximalist'];
// materials vocabulary for the master library — a managed list so pieces can be filtered by it
const DEFAULT_MATERIALS = [
  { key: 'wood', label: 'Wood' },
  { key: 'metal', label: 'Metal' },
  { key: 'leather', label: 'Leather' },
  { key: 'fabric', label: 'Fabric' },
  { key: 'velvet', label: 'Velvet' },
  { key: 'rattan', label: 'Rattan / Cane' },
  { key: 'glass', label: 'Glass' },
  { key: 'stone', label: 'Stone / Marble' },
];
/* ---------------- faceted tag system ----------------
   ONE vocabulary (`tags`), every entry stamped with its `facet`. Controlled-vocabulary
   facets (style / material / object / palette + any custom one) live here, and pieces
   reference them by id in `piece.tags` (a flat, mixed-facet array). The color facet is
   free-valued, so pieces carry hex directly in `colors` / `accentColors` — a palette is
   how you save & name a reusable group of swatches. Facets are data, so designers can add
   their own from the admin. Only facets with `scored:true` drive the quiz result. */
const CORE_FACETS = [
  { key: 'style',    label: 'Style',    kind: 'tag',     scored: true, builtin: true },
  { key: 'material', label: 'Material', kind: 'tag',     builtin: true },
  { key: 'object',   label: 'Object',   kind: 'tag',     builtin: true },
  { key: 'color',    label: 'Color',    kind: 'swatch',  builtin: true },
  { key: 'palette',  label: 'Palette',  kind: 'palette', builtin: true },
];
// seed the unified vocabulary from the legacy style + material lists
function buildDefaultTags() {
  return [
    ...DEFAULT_CATEGORIES.map((c) => ({ id: c.key, facet: 'style', label: c.label, color: c.color, desc: c.desc })),
    ...DEFAULT_MATERIALS.map((m) => ({ id: m.key, facet: 'material', label: m.label })),
  ];
}
const DEFAULT_STATE = {
  version: 4,
  // baked-in hosted source: every visitor auto-loads these rooms, no admin setup needed
  manifestUrl: 'https://nuninhosousa25.github.io/Furniture_style/manifest.json',
  destinationEmail: '',
  businessName: 'our team',
  facets: CORE_FACETS,
  tags: buildDefaultTags(),
  // the master library: the big pool of pieces you filter and assemble client rooms from
  library: [],
  quizzes: [{ id: 'q-living', name: 'Living Room', file: 'living-room.json', pieces: starterPieces('lr', LIVING_TAGS) }],
};
// key name frozen at "_v3" on purpose: renaming it would orphan every user's cached working copy.
// The real schema version lives in `version` inside the payload (now 4); withDefaults() upgrades it.
const STORAGE_KEY = 'furnitureStyleQuizState_v3';

/* ---------------- faceted tag helpers ---------------- */
function tagIndex(tags) { return Object.fromEntries((tags || []).map((t) => [t.id, t])); }
function facetTags(tags, facet) { return (tags || []).filter((t) => t.facet === facet); }
// the tags on a piece that belong to one facet, resolved to full tag objects
function pieceFacet(piece, byId, facet) { return (piece.tags || []).filter((id) => byId[id] && byId[id].facet === facet).map((id) => byId[id]); }
// a piece's first style tag — used for the card / swatch background color
function primaryStyle(piece, byId) { const id = (piece.tags || []).find((t) => byId[t] && byId[t].facet === 'style'); return id ? byId[id] : null; }

/* ---------------- rooms-as-references helpers ----------------
   The master library is the single source of truth for images. A room stores only
   `members: [{ libId }]` and we hydrate those references into runnable pieces at the
   point of use, so the runtime/scoring/admin keep reading `card.imageUrl/tags/...`. */
function libIndex(library) { return Object.fromEntries((library || []).map((p) => [p.id, p])); }
function roomPieces(room, libById) {
  const seen = new Set();
  return (room.members || []).map((m) => {
    if (!m || seen.has(m.libId)) return null; seen.add(m.libId);   // a room is a set: one ref per piece
    const lib = libById[m.libId];
    return lib ? { ...lib, id: `${room.id}-${m.libId}`, libId: m.libId } : null;  // skip dangling refs
  }).filter(Boolean);
}

/* migrate any older stored / remote state into the v4 faceted shape:
   - build `facets` + a unified `tags` vocabulary from legacy categories/materials
   - fold each piece's separate `materials` array into its mixed-facet `tags`
   - backfill color arrays; old style ids already live in `tags` as valid vocab ids */
function withDefaults(s) {
  if (!s) return s;
  // unify the vocabulary: keep any existing tags, then absorb legacy categories/materials
  let tags = Array.isArray(s.tags) ? s.tags.slice() : [];
  const have = new Set(tags.map((t) => t.id));
  if (Array.isArray(s.categories)) s.categories.forEach((c) => { if (!have.has(c.key)) { tags.push({ id: c.key, facet: 'style', label: c.label, color: c.color, desc: c.desc, custom: c.custom }); have.add(c.key); } });
  if (Array.isArray(s.materials)) s.materials.forEach((m) => { if (!have.has(m.key)) { tags.push({ id: m.key, facet: 'material', label: m.label, custom: true }); have.add(m.key); } });
  if (!tags.length) tags = buildDefaultTags();
  // facets: keep stored, guarantee the core set exists
  let facets = Array.isArray(s.facets) && s.facets.length ? s.facets.slice() : [];
  const fhave = new Set(facets.map((f) => f.key));
  CORE_FACETS.forEach((f) => { if (!fhave.has(f.key)) { facets.push(f); fhave.add(f.key); } });
  // fold legacy piece.materials into piece.tags; keep colors; drop the separate materials array
  const fixPiece = (p) => {
    const tagIds = Array.isArray(p.tags) ? p.tags.slice() : [];
    if (Array.isArray(p.materials)) p.materials.forEach((m) => { if (m && !tagIds.includes(m)) tagIds.push(m); });
    const { materials, ...rest } = p;
    return { ...rest, tags: tagIds, colors: p.colors || [], accentColors: p.accentColors || [] };
  };
  // the master library is the single source of truth for images; start from existing entries
  const library = (Array.isArray(s.library) ? s.library : []).map(fixPiece);
  const libById = {}, byImage = {};
  library.forEach((p) => { libById[p.id] = p; if (p.imageUrl) byImage[p.imageUrl] = p.id; });
  let migCount = 0;
  // ensure a piece has a library entry, returning its libId (dedupe one-offs by image url)
  const ensureLib = (p) => {
    if (p.libId && libById[p.libId]) return p.libId;
    if (p.imageUrl && byImage[p.imageUrl]) return byImage[p.imageUrl];
    // prefer a stable id (the piece's own id or libId) so re-exports don't churn ids
    const id = (p.libId && !libById[p.libId]) ? p.libId
             : (p.id && !libById[p.id]) ? p.id
             : `lib-mig-${Date.now().toString(36)}-${migCount++}`;
    const { libId, id: _omit, ...rest } = p;
    const entry = { id, ...rest };
    library.push(entry); libById[id] = entry; if (entry.imageUrl) byImage[entry.imageUrl] = id;
    return id;
  };
  // normalize each room to a list of references; migrate any embedded pieces into the library;
  // de-collide duplicate room ids (the live kitchen/Potato collision)
  const seenRoomIds = new Set();
  const quizzes = (s.quizzes || []).map((q) => {
    let id = q.id || `q-${slug(q.name)}`;
    while (seenRoomIds.has(id)) id = `${id}-2`;
    seenRoomIds.add(id);
    const raw = Array.isArray(q.members)
      ? q.members.filter((m) => m && m.libId)
      : (q.pieces || []).map((p) => ({ libId: ensureLib(fixPiece(p)) }));
    const seenLib = new Set();
    const members = raw.filter((m) => (seenLib.has(m.libId) ? false : seenLib.add(m.libId)));  // unique per piece
    const { pieces, ...rest } = q;
    return { ...rest, id, members };
  });
  // referential integrity: any tag id a piece references but the vocabulary lacks becomes a
  // style tag (old data stored only style keys in piece.tags), so nothing renders as an orphan
  const haveTag = new Set(tags.map((t) => t.id));
  // strip only the generated 4-char token suffix (slug + '-' + Date.now().toString(36).slice(-4)),
  // not real 2–5 char words, so "art-deco-wxyz" → "Art Deco" but "art-deco" stays intact
  const deSlug = (id) => (id.replace(/-[a-z0-9]{4}$/, '').replace(/-/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase()) || id);
  library.forEach((p) => (p.tags || []).forEach((id) => {
    if (!haveTag.has(id)) { tags.push({ id, facet: 'style', label: deSlug(id), color: NEW_TAG_PALETTE[tags.length % NEW_TAG_PALETTE.length], desc: `${deSlug(id)} style.`, custom: true }); haveTag.add(id); }
  }));
  return { ...s, version: 4, facets, tags, library, quizzes, categories: undefined, materials: undefined };
}

/* ---------------- deep links ----------------
   ?room=<id|slug>  jumps a client straight into that room and hides the gear.
   ?dev=true        reveals the gear icon so you can open the admin area.
   nothing set      shows the normal room picker with no admin access.
   This hides admin from clients; it is not hard security (the admin area only
   edits a local browser copy and downloads files, it cannot change hosted content). */
const URL_PARAMS = new URLSearchParams(typeof window !== 'undefined' ? window.location.search : '');
const ROOM_PARAM = URL_PARAMS.get('room');
const DEV_MODE = URL_PARAMS.get('dev') === 'true';
function findQuizByParam(quizzes, param) {
  if (!param) return null;
  const p = param.trim().toLowerCase();
  return quizzes.find((q) => (q.id || '').toLowerCase() === p)
    || quizzes.find((q) => slug(q.name) === p)
    || null;
}

/* Minimum number of pieces a client must react to before they can stop early.
   The quiz never asks for more than the total pieces in the room, and the
   order is randomised every run. */
const MIN_QUESTIONS = 20;

const ACTIONS = [
  { key: 'superDislike', label: 'Never', stamp: 'NEVER', delta: -2, color: 'var(--ink)', icon: 'no-entry', badge: true },
  { key: 'dislike', label: 'Dislike', stamp: 'DISLIKE', delta: -1, color: 'var(--rust)', icon: 'x', badge: false },
  { key: 'like', label: 'Like', stamp: 'LIKE', delta: 1, color: 'var(--sage)', icon: 'heart', badge: false },
  { key: 'superLike', label: 'Love it', stamp: 'LOVE IT', delta: 2, color: 'var(--brass)', icon: 'heart', badge: true },
];
const EXIT_CLASS = { superDislike: 'exit-left-strong', dislike: 'exit-left', like: 'exit-right', superLike: 'exit-right-strong' };
const sign = (v) => (v >= 0 ? '+' : '') + v;

/* ---------------- remote loading ---------------- */
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return res.json();
}
async function loadFromManifest(manifestUrl) {
  const m = await fetchJson(manifestUrl);
  const rooms = Array.isArray(m.rooms) ? m.rooms : [];
  if (!rooms.length) throw new Error('Manifest has no "rooms" array.');
  const quizzes = [];
  for (const r of rooms) {
    const fileUrl = new URL(r.file, manifestUrl).href;
    const rd = await fetchJson(fileUrl);
    quizzes.push({ id: r.id || ('q-' + slug(r.name)), name: r.name || rd.name || 'Quiz', file: r.file, members: Array.isArray(rd.members) ? rd.members : undefined, pieces: Array.isArray(rd.pieces) ? rd.pieces : undefined });
  }
  return {
    // pass the raw vocabulary through; applyRemote + withDefaults unify old manifests
    // (categories/materials) and new ones (facets/tags) into the faceted shape
    facets: Array.isArray(m.facets) ? m.facets : undefined,
    tags: Array.isArray(m.tags) ? m.tags : undefined,
    categories: Array.isArray(m.categories) ? m.categories : undefined,
    materials: Array.isArray(m.materials) ? m.materials : undefined,
    library: Array.isArray(m.library) ? m.library : undefined,
    quizzes,
    businessName: m.businessName,
    destinationEmail: m.destinationEmail,
  };
}

/* ---------------- card ----------------
   Cards lock to a fixed footprint. Each piece's display aspect is its crop ratio, clamped to a
   gentle vertical band (4:5 .. 2:3). The card slot always reserves the TALLEST allowed height and
   centres the card, so the reaction buttons sit at a fixed baseline regardless of the photo. */
const CARD_RATIO_MIN = 2 / 3;     // 0.667 — tallest allowed (width / height)
const CARD_RATIO_MAX = 4 / 5;     // 0.8   — least tall allowed
const CARD_RATIO_DEFAULT = 0.75;  // 3:4   — vertical-favouring default when a piece has no crop
// swipe-screen layout. The card width caps and the vertical space the controls below the card
// occupy (progress bar + note field + 4 reaction buttons + optional stop button). Keep RESERVE
// in sync if those controls change height, or the card slot will mis-size (see QuizView).
const CARD_MAX_W_DESKTOP = 460, CARD_MAX_W_MOBILE = 384;
const CARD_CONTROLS_RESERVE_DESKTOP = 300, CARD_CONTROLS_RESERVE_MOBILE = 268;
const CARD_SLOT_MIN_H = 220;      // floor the card slot so it shrinks (not clips controls) on short viewports
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
function cardRatio(piece) { const r = piece && piece.crop && piece.crop.ratio; return clamp(r || CARD_RATIO_DEFAULT, CARD_RATIO_MIN, CARD_RATIO_MAX); }
// a crop is usable only if it's a complete, in-bounds normalised rect; otherwise fall back to cover
function validCrop(crop) { return crop && [crop.x, crop.y, crop.w, crop.h].every((n) => typeof n === 'number' && n >= 0) && crop.w > 0 && crop.h > 0 ? crop : null; }

/* renders the stored crop rect of an image into its (already correctly-shaped) box.
   crop = { ratio, x, y, w, h } with x/y/w/h normalised 0..1; absent/malformed => plain centred cover.
   Pure CSS — never reads pixels, so remote (cross-origin) images are fine. */
function CroppedImage({ src, crop, alt, onError }) {
  const c = validCrop(crop);
  const common = { pointerEvents: 'none', WebkitUserDrag: 'none' };
  if (!c) return <img src={src} alt={alt || ''} draggable={false} onError={onError} className="w-full h-full select-none" style={{ objectFit: 'cover', ...common }} />;
  return <img src={src} alt={alt || ''} draggable={false} onError={onError} className="select-none" style={{ position: 'absolute', width: `${100 / c.w}%`, height: `${100 / c.h}%`, left: `${(-c.x * 100) / c.w}%`, top: `${(-c.y * 100) / c.h}%`, maxWidth: 'none', ...common }} />;
}

function CardFace({ card, catMap, plain }) {
  const cat = primaryStyle(card, catMap) || { color: '#E4DCC9' };
  const text = cat.text || readableText(cat.color);
  const [imgFailed, setImgFailed] = useState(false);
  useEffect(() => { setImgFailed(false); }, [card.imageUrl]);
  const showImage = card.imageUrl && !imgFailed;
  return (
    <div className="absolute inset-0 rounded-lg overflow-hidden shadow-xl" style={{ background: cat.color }}>
      {showImage ? (
        <CroppedImage src={card.imageUrl} crop={plain ? null : card.crop} alt={card.name} onError={() => setImgFailed(true)} />
      ) : (
        <div className="w-full h-full flex flex-col items-center justify-center gap-3 px-8 text-center">
          <Icon name="image" size={56} strokeWidth={1.25} color={text} />
          <span className="font-mono" style={{ fontSize: '11px', color: text, opacity: 0.6 }}>NO PHOTO YET</span>
        </div>
      )}
      {card.name && (
        <div className="absolute bottom-0 left-0 right-0 px-5 py-4" style={{ background: showImage ? 'linear-gradient(to top, rgba(20,16,12,0.78), rgba(20,16,12,0))' : 'rgba(0,0,0,0.06)' }}>
          <p className="font-display text-xl leading-snug" style={{ color: showImage ? '#FBF6EE' : text }}>{card.name}</p>
        </div>
      )}
    </div>
  );
}
function StampOverlay({ action }) {
  if (!action) return null;
  const a = ACTIONS.find((x) => x.key === action);
  return (
    <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
      <div className="stamp font-display text-3xl sm:text-4xl font-bold px-6 py-2 border-4 rounded-xl tracking-wide" style={{ color: a.color, borderColor: a.color, background: 'rgba(251,248,242,0.82)', boxShadow: '0 2px 12px rgba(0,0,0,0.18)', transform: 'rotate(-10deg)' }}>{a.stamp}</div>
    </div>
  );
}
function QuizView({ pieces, index, onAction, onUndo, canUndo, undoCount, exiting, catMap, minRequired, note, setNote, onStop, isDesktop, vw, vh }) {
  const card = pieces[index], next = pieces[index + 1];
  const total = pieces.length;
  const progress = Math.round((index / total) * 100);
  // they have already reacted to `index` pieces; they may stop once that meets the minimum
  const canStop = total > minRequired && index >= minRequired;

  // drag-to-swipe, one code path for mouse (PC) and touch (mobile) via Pointer Events.
  // Kept simple: right = Like, left = Pass. The double reactions (Never / Love it) live on
  // the buttons only — swipe distance no longer changes the strength, just the direction.
  const frameRef = useRef(null);
  const dragSt = useRef(null);
  const [drag, setDrag] = useState({ x: 0, y: 0, active: false });
  // clear any offset the instant a new card mounts, before paint, so it never flashes in
  useLayoutEffect(() => { setDrag({ x: 0, y: 0, active: false }); dragSt.current = null; }, [card && card.id]);
  // how far the card must travel before a swipe commits; capped so it stays reachable on wide desktop cards
  const commitDistance = () => { const w = frameRef.current ? frameRef.current.getBoundingClientRect().width : 320; return Math.min(110, Math.max(60, w * 0.18)); };
  const swipeKey = (dx) => (dx > 0 ? 'like' : 'dislike');
  const onPointerDown = (e) => { if (exiting) return; dragSt.current = { id: e.pointerId, sx: e.clientX, sy: e.clientY }; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {} setDrag({ x: 0, y: 0, active: true }); };
  const onPointerMove = (e) => { const d = dragSt.current; if (!d || d.id !== e.pointerId) return; setDrag({ x: e.clientX - d.sx, y: e.clientY - d.sy, active: true }); };
  const endDrag = (e) => {
    const d = dragSt.current; if (!d) return; dragSt.current = null;
    const dx = e.clientX != null ? e.clientX - d.sx : drag.x;
    const key = Math.abs(dx) >= commitDistance() ? swipeKey(dx) : null;
    setDrag({ x: 0, y: 0, active: false });
    if (key) onAction(ACTIONS.find((a) => a.key === key));
  };
  // live stamp while dragging (Like or Pass only), fading in with distance
  let preview = null, previewOpacity = 0;
  if (drag.active && Math.abs(drag.x) > 8) {
    preview = ACTIONS.find((a) => a.key === swipeKey(drag.x));
    previewOpacity = Math.min(1, Math.abs(drag.x) / (commitDistance() * 0.7));
  }
  // fixed footprint: card width is fixed for the screen; the slot reserves the TALLEST allowed
  // height (2:3) and centres each card, so the reaction buttons never move. Each card's height is
  // its crop ratio clamped to the vertical band.
  const maxW = isDesktop ? CARD_MAX_W_DESKTOP : Math.min(CARD_MAX_W_MOBILE, (vw || 384) - 32);
  const reserve = isDesktop ? CARD_CONTROLS_RESERVE_DESKTOP : CARD_CONTROLS_RESERVE_MOBILE;
  // let the slot shrink to what actually fits the viewport height, so the reaction buttons never clip
  const slotMaxH = Math.max(CARD_SLOT_MIN_H, Math.round(vh || 800) - reserve);
  const cardW = Math.min(maxW, Math.round(slotMaxH * CARD_RATIO_MIN));   // cap width so the tallest card still fits
  const slotH = Math.round(cardW / CARD_RATIO_MIN);
  const cardH = Math.round(cardW / cardRatio(card));
  const frame = { width: cardW + 'px', height: cardH + 'px', transition: 'width .25s ease, height .25s ease' };
  const slotStyle = { width: cardW + 'px', height: slotH + 'px' };
  const outerStyle = { width: cardW + 'px' };

  return (
    <div className={`w-full flex flex-col items-center ${isDesktop ? 'flex-1 justify-center' : ''}`}>
     <div className="flex flex-col items-center mx-auto" style={outerStyle}>
      <div className="w-full flex items-center justify-between mb-3 px-1">
        <span className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>PIECE {index + 1} / {total}</span>
        <button onClick={onUndo} disabled={!canUndo || !!exiting} className="font-mono text-xs flex items-center gap-1 disabled:opacity-30" aria-label={canUndo ? `Go back — ${undoCount} piece${undoCount === 1 ? '' : 's'} to undo` : 'Undo last'} title="Step back through previous pieces to change your answer">
          <Icon name="undo" size={13} /> UNDO{undoCount > 0 ? ` (${undoCount})` : ''}
        </button>
      </div>
      <div className="w-full h-1.5 rounded-full mb-5 overflow-hidden" style={{ background: 'rgba(43,37,32,0.12)' }}>
        <div className="h-full rounded-full transition-all duration-300" style={{ width: `${progress}%`, background: 'var(--brass)' }} />
      </div>
      <div className="relative flex items-center justify-center" style={slotStyle}>
       <div ref={frameRef} className="relative" style={frame}>
        {next && <div className="absolute inset-0 scale-95 translate-y-3 opacity-60"><CardFace card={next} catMap={catMap} plain /></div>}
        <div
          className={`absolute inset-0 select-none ${exiting ? EXIT_CLASS[exiting] : ''}`}
          onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={endDrag} onPointerCancel={endDrag}
          style={{ transform: `translate(${drag.x}px, ${drag.y}px) rotate(${drag.x * 0.05}deg)`, transition: drag.active ? 'none' : 'transform .2s ease', touchAction: 'none', cursor: drag.active ? 'grabbing' : 'grab' }}
        >
          <CardFace card={card} catMap={catMap} />
          <StampOverlay action={exiting} />
          {!exiting && preview && (
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
              <div className="font-display text-3xl sm:text-4xl font-bold px-6 py-2 border-4 rounded-xl tracking-wide" style={{ color: preview.color, borderColor: preview.color, background: 'rgba(251,248,242,0.82)', boxShadow: '0 2px 12px rgba(0,0,0,0.18)', transform: `rotate(${drag.x > 0 ? -10 : 10}deg)`, opacity: previewOpacity }}>{preview.stamp}</div>
            </div>
          )}
        </div>
       </div>
      </div>
      <div className="w-full mt-5 flex items-center gap-2">
        <span style={{ opacity: 0.4 }}><Icon name="message" size={15} /></span>
        <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Add a note (optional), e.g. love the colour" className="field" style={{ fontSize: '13px' }} />
      </div>
      <div className="grid grid-cols-4 gap-3 w-full mt-4">
        {ACTIONS.map((a) => (
          <button key={a.key} onClick={() => onAction(a)} disabled={!!exiting} aria-label={a.label} className="flex flex-col items-center justify-center gap-1 rounded-lg py-3 border transition-transform active:scale-95 disabled:opacity-50" style={{ borderColor: a.color, color: a.color, background: 'var(--card)', boxShadow: '0 2px 5px rgba(30,26,20,0.10)' }}>
            <span className="relative">
              <Icon name={a.icon} size={22} color={a.color} fill={a.key === 'superLike' || a.key === 'like' ? a.color : 'none'} />
              {a.badge && <span className="absolute -top-1 -right-2 font-mono font-bold" style={{ color: a.color, fontSize: '10px' }}>x2</span>}
            </span>
            <span className="font-mono tracking-wide" style={{ fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{a.label}</span>
          </button>
        ))}
      </div>
      {canStop && (
        <button onClick={onStop} disabled={!!exiting} className="tag-button mt-6 disabled:opacity-50">
          <Icon name="flag" size={14} color="var(--card)" /> Stop &amp; see my results ({index} answered)
        </button>
      )}
     </div>
    </div>
  );
}

/* ---------------- detailed responses (for the technicians) ---------------- */
function DetailedResponses({ responses, catMap }) {
  if (!responses.length) return null;
  const noteCount = responses.filter((r) => r.note).length;
  // strongest reaction first (Love it, Like, Pass, Never), keeping show order within a tie
  const ordered = [...responses].sort((a, b) => b.delta - a.delta);
  return (
    <div className="w-full">
      <p className="font-mono text-xs tracking-widest mb-3" style={{ opacity: 0.6 }}>EVERY REACTION ({responses.length}{noteCount ? `, ${noteCount} with notes` : ''})</p>
      <div className="flex flex-col gap-2">
        {ordered.map((r, i) => {
          const a = ACTIONS.find((x) => x.key === r.actionKey) || { color: 'var(--ink)' };
          const sw = primaryStyle(r, catMap) || { color: '#E4DCC9' };
          const tagLabels = r.tags.map((t) => catMap[t]?.label || t).join(', ');
          return (
            <div key={i} className="rounded-xl p-3 flex items-start gap-3" style={{ background: 'var(--card)' }}>
              <div className="w-9 h-9 rounded-lg flex-shrink-0 overflow-hidden" style={{ background: sw.color }}>
                {r.imageUrl ? <img src={r.imageUrl} alt="" className="w-full h-full object-cover" /> : null}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between gap-2">
                  <p className="text-sm font-medium truncate">{i + 1}. {r.pieceName || 'Untitled piece'}</p>
                  <span className="font-mono flex-shrink-0" style={{ color: a.color, fontSize: '11px' }}>{r.actionLabel} ({sign(r.delta)})</span>
                </div>
                {tagLabels && <p className="text-xs truncate" style={{ opacity: 0.55 }}>{tagLabels}</p>}
                {r.note && <p className="text-sm mt-1 leading-snug" style={{ color: 'var(--ink)' }}>&ldquo;{r.note}&rdquo;</p>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------- results + share ---------------- */
function ResultsView({ scores, counts, usedKeys, responses, catMap, quizName, destinationEmail, businessName, onRestart }) {
  const [clientName, setClientName] = useState('');
  const [copied, setCopied] = useState(false);
  // average affinity per category, range about -2..+2, so volume does not bias the result
  const cats = usedKeys.map((k) => catMap[k]).filter(Boolean).map((c) => {
    const cnt = counts[c.id] || 0;
    const avg = cnt ? (scores[c.id] || 0) / cnt : 0;
    return { ...c, avg, cnt };
  });
  const ranked = [...cats].sort((a, b) => b.avg - a.avg);
  const top = ranked[0];
  const second = ranked[1];
  const showSecond = second && second.avg > 0 && top.avg - second.avg <= 0.5;

  // color palette: drawn from the pieces the client reacted positively to (Like / Love it),
  // strongest reaction first, deduped. Only appears if those pieces carried colors.
  const liked = [...responses].filter((r) => r.delta > 0).sort((a, b) => b.delta - a.delta);
  const dedupe = (arr) => [...new Set(arr.map((c) => (c || '').toUpperCase()))].filter(Boolean);
  const mainPalette = dedupe(liked.flatMap((r) => r.colors || [])).slice(0, 8);
  const accentPalette = dedupe(liked.flatMap((r) => r.accentColors || [])).slice(0, 6);
  const hasPalette = mainPalette.length > 0 || accentPalette.length > 0;

  // weighted extras: what the client gravitated toward per non-style facet, ranked by reaction
  // strength (Like +1, Love it +2). The style still drives the profile; these are descriptive.
  const facetTally = (facet) => {
    const m = {};
    liked.forEach((r) => (r.tags || []).forEach((id) => { const t = catMap[id]; if (t && t.facet === facet) m[id] = (m[id] || 0) + r.delta; }));
    return Object.entries(m).sort((a, b) => b[1] - a[1]).map(([id]) => catMap[id]).filter(Boolean);
  };
  const likedMaterials = facetTally('material');
  const likedObjects = facetTally('object');
  const likedPalettes = facetTally('palette');
  const hasDrawn = likedMaterials.length > 0 || likedObjects.length > 0 || likedPalettes.length > 0;

  const fmt = (v) => (v >= 0 ? '+' : '') + v.toFixed(1);
  const buildSummary = () => {
    const lines = [`Style quiz result, ${quizName}`];
    if (clientName.trim()) lines.push(`From: ${clientName.trim()}`);
    lines.push(`Pieces reviewed: ${responses.length}`);
    if (top) lines.push(`Top style: ${top.label} (${fmt(top.avg)})`);
    if (showSecond) lines.push(`Also leans: ${second.label} (${fmt(second.avg)})`);
    if (mainPalette.length) lines.push(`Color palette (from liked pieces): ${mainPalette.join(', ')}`);
    if (accentPalette.length) lines.push(`Accent colors: ${accentPalette.join(', ')}`);
    if (likedMaterials.length) lines.push(`Materials they liked: ${likedMaterials.slice(0, 8).map((t) => t.label).join(', ')}`);
    if (likedObjects.length) lines.push(`Objects they liked: ${likedObjects.slice(0, 8).map((t) => t.label).join(', ')}`);
    if (likedPalettes.length) lines.push(`Palettes they liked: ${likedPalettes.map((t) => t.label).join(', ')}`);
    lines.push('', 'Affinity by style (average reaction, -2 to +2):');
    ranked.forEach((s) => lines.push(`- ${s.label}: ${fmt(s.avg)} (over ${s.cnt} piece${s.cnt === 1 ? '' : 's'})`));
    lines.push('', 'Detailed responses, strongest reaction first:');
    [...responses].sort((a, b) => b.delta - a.delta).forEach((r, i) => {
      const tagLabels = r.tags.map((t) => catMap[t]?.label || t).join(', ');
      lines.push(`${i + 1}. ${r.pieceName || 'Untitled piece'} — ${r.actionLabel} (${sign(r.delta)})${tagLabels ? ` [${tagLabels}]` : ''}`);
      if (r.note) lines.push(`   Note: ${r.note}`);
    });
    return lines.join('\n');
  };
  const sendEmail = () => {
    const subject = `Style quiz result${clientName.trim() ? ` from ${clientName.trim()}` : ''}, ${quizName}`;
    window.location.href = `mailto:${encodeURIComponent(destinationEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(buildSummary())}`;
  };
  const nativeShare = async () => { try { await navigator.share({ title: `Style quiz result, ${quizName}`, text: buildSummary() }); } catch (e) {} };
  const copy = async () => { try { await navigator.clipboard.writeText(buildSummary()); setCopied(true); setTimeout(() => setCopied(false), 1800); } catch (e) {} };

  const shareRow = (
    <div className="w-full rounded-lg p-4 flex flex-col gap-3" style={{ background: 'var(--card)' }}>
      <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>SEND THIS TO {(businessName || 'US').toUpperCase()}</p>
      <input value={clientName} onChange={(e) => setClientName(e.target.value)} placeholder="Your name (optional)" className="field" />
      <div className="flex flex-wrap gap-2">
        {destinationEmail && <button onClick={sendEmail} className="tag-button"><Icon name="send" size={15} color="var(--card)" /> Send to us</button>}
        {typeof navigator !== 'undefined' && navigator.share && <button onClick={nativeShare} className="ghost-button"><Icon name="upload" size={14} /> Share</button>}
        <button onClick={copy} className="ghost-button"><Icon name="copy" size={14} /> {copied ? 'Copied' : 'Copy result'}</button>
      </div>
      {!destinationEmail && <p className="text-xs" style={{ opacity: 0.55 }}>Tip: set your email under Manage so a "Send to us" button appears here.</p>}
      <p className="text-xs" style={{ opacity: 0.55 }}>The message includes every reaction and note so the team can read your taste piece by piece.</p>
    </div>
  );

  if (!top || top.avg <= 0) {
    return (
      <div className="w-full max-w-xs flex flex-col items-center text-center gap-6">
        <div className="flex flex-col items-center gap-3">
          <p className="font-display text-2xl">Nothing quite landed</p>
          <p className="text-sm" style={{ opacity: 0.75 }}>That's useful too. Send this to {businessName} and we'll start from scratch with you, your notes still help.</p>
          <button onClick={onRestart} className="ghost-button mt-1"><Icon name="rotate" size={14} /> Try again</button>
        </div>
        {shareRow}
      </div>
    );
  }
  return (
    <div className="w-full max-w-xs flex flex-col items-center gap-6">
      <div className="text-center">
        <p className="font-mono text-xs tracking-widest mb-2" style={{ opacity: 0.6 }}>YOUR STYLE PROFILE, {quizName.toUpperCase()}</p>
        <p className="font-display text-3xl">{top.label}</p>
      </div>
      <div className="w-full rounded-lg p-5 relative overflow-hidden shadow-lg" style={{ background: top.color, color: top.text || readableText(top.color) }}>
        <div className="absolute left-1/2 -translate-x-1/2 top-4 w-4 h-4 rounded-full" style={{ background: '#FBF8F2', boxShadow: 'inset 0 1px 3px rgba(0,0,0,0.3)' }} />
        <p className="mt-6 text-sm leading-relaxed">{top.desc}</p>
      </div>
      {showSecond && <p className="text-sm text-center" style={{ opacity: 0.8 }}>You also lean toward <span className="font-semibold">{second.label}</span>.</p>}
      {hasDrawn && (
        <div className="w-full rounded-lg p-4 flex flex-col gap-3" style={{ background: 'var(--card)' }}>
          <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>WHAT YOU'RE DRAWN TO</p>
          {likedMaterials.length > 0 && (
            <div className="flex flex-col gap-1.5">
              <span className="text-xs" style={{ opacity: 0.55 }}>Materials</span>
              <div className="flex flex-wrap gap-1.5">{likedMaterials.slice(0, 6).map((t) => <span key={t.id} className="text-xs rounded-full px-2.5 py-1 border" style={{ borderColor: 'rgba(43,37,32,0.2)' }}>{t.label}</span>)}</div>
            </div>
          )}
          {likedObjects.length > 0 && (
            <div className="flex flex-col gap-1.5">
              <span className="text-xs" style={{ opacity: 0.55 }}>Pieces &amp; objects</span>
              <div className="flex flex-wrap gap-1.5">{likedObjects.slice(0, 6).map((t) => <span key={t.id} className="text-xs rounded-full px-2.5 py-1 border" style={{ borderColor: 'rgba(43,37,32,0.2)' }}>{t.label}</span>)}</div>
            </div>
          )}
          {likedPalettes.length > 0 && (
            <div className="flex flex-col gap-2">
              <span className="text-xs" style={{ opacity: 0.55 }}>Palettes</span>
              {likedPalettes.slice(0, 4).map((t) => (
                <div key={t.id} className="flex items-center gap-2">
                  <span className="text-xs flex-shrink-0">{t.label}</span>
                  <div className="flex gap-1 flex-wrap">{(t.swatches || []).slice(0, 6).map((c, i) => <span key={i} title={c} className="w-4 h-4 rounded-full" style={{ background: c, border: '1px solid rgba(43,37,32,0.15)' }} />)}</div>
                </div>
              ))}
            </div>
          )}
          <p className="text-xs" style={{ opacity: 0.55 }}>Weighted by how strongly you reacted — Love it counts double.</p>
        </div>
      )}
      {hasPalette && (
        <div className="w-full rounded-lg p-4 flex flex-col gap-3" style={{ background: 'var(--card)' }}>
