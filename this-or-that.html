<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Find Your Style — this or that</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  html, body { margin: 0; padding: 0; }
  .font-display { font-family: 'Fraunces', serif; }
  .font-mono { font-family: 'IBM Plex Mono', monospace; }
  .tag-button { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.05em; padding: 10px 18px; border-radius: 999px; border: 1px solid var(--ink); background: var(--ink); color: var(--card); cursor: pointer; }
  .ghost-button { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(43,37,32,0.25); background: transparent; color: var(--ink); cursor: pointer; }
  .field { border-radius: 12px; padding: 8px 12px; border: 1px solid rgba(43,37,32,0.2); background: #fff; font-size: 14px; width: 100%; box-sizing: border-box; }
  .pop-in { animation: popIn 0.25s ease forwards; }
  @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @media (prefers-reduced-motion: reduce) { .pop-in { animation: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<!-- App source is compiled by Babel below with the classic JSX runtime.
     We do NOT use type="text/babel" auto-run: recent @babel/standalone builds
     default the react preset to the automatic runtime, which emits bare
     `import` statements that break in a plain (non-module) page. -->
<script type="text/plain" id="app-source">
const { useState, useEffect, useRef } = React;

/* ---------------- icons ---------------- */
function Icon({ name, size = 18, color = 'currentColor', fill = 'none', strokeWidth = 2 }) {
  const c = { width: size, height: size, viewBox: '0 0 24 24', fill, stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'x': return <svg {...c}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>;
    case 'heart': return <svg {...c}><path d="M12 21s-1-.6-2.6-1.9C5.4 15.7 2 12.6 2 8.9 2 6.2 4.2 4 6.9 4c1.6 0 3.1.8 4.1 2.1C12 4.8 13.5 4 15.1 4 17.8 4 20 6.2 20 8.9c0 3.7-3.4 6.8-7.4 10.2C12 21 12 21 12 21z" /></svg>;
    case 'settings': return <svg {...c}><line x1="4" y1="6" x2="20" y2="6" /><circle cx="14" cy="6" r="2" fill={color} /><line x1="4" y1="12" x2="20" y2="12" /><circle cx="8" cy="12" r="2" fill={color} /><line x1="4" y1="18" x2="20" y2="18" /><circle cx="16" cy="18" r="2" fill={color} /></svg>;
    case 'arrow-left': return <svg {...c}><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>;
    case 'plus': return <svg {...c}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>;
    case 'trash': return <svg {...c}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1.2 14a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 6" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>;
    case 'pencil': return <svg {...c}><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>;
    case 'rotate': return <svg {...c}><path d="M3 12a9 9 0 1 0 2.6-6.3L3 8" /><polyline points="3 3 3 8 8 8" /></svg>;
    case 'image': return <svg {...c}><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="9" cy="9" r="1.5" fill={color} /><path d="M21 15l-5-5-9 9" /></svg>;
    case 'download': return <svg {...c}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>;
    case 'upload': return <svg {...c}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></svg>;
    case 'send': return <svg {...c}><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>;
    case 'copy': return <svg {...c}><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></svg>;
    case 'chevron': return <svg {...c}><polyline points="9 18 15 12 9 6" /></svg>;
    case 'undo': return <svg {...c}><path d="M3 7v6h6" /><path d="M3 13a9 9 0 1 0 3-7.7L3 8" /></svg>;
    case 'cloud': return <svg {...c}><path d="M17.5 19a4.5 4.5 0 0 0 .5-9 6 6 0 0 0-11.6-1.5A4 4 0 0 0 6.5 19Z" /></svg>;
    case 'flag': return <svg {...c}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1Z" /><line x1="4" y1="22" x2="4" y2="15" /></svg>;
    case 'check': return <svg {...c}><polyline points="20 6 9 17 4 12" /></svg>;
    default: return null;
  }
}

/* ---------------- helpers ---------------- */
function readableText(hex) {
  const h = (hex || '').replace('#', '');
  if (h.length !== 6) return '#2B2520';
  const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.6 ? '#2B2520' : '#FBF6EE';
}
function slug(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 24) || 'item'; }
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
const NEW_TAG_PALETTE = ['#8C9A6B', '#7C6A8A', '#3F6B6B', '#A85751', '#C9A227', '#5E7A6C', '#9C7B52', '#46423C'];
function download(filename, text) {
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ---------------- defaults ---------------- */
const DEFAULT_CATEGORIES = [
  { key: 'scandinavian', label: 'Scandinavian', color: '#E4DCC9', desc: 'Light wood, soft neutrals, and clean lines. Calm, functional, and a little cozy.' },
  { key: 'industrial', label: 'Industrial', color: '#46423C', desc: 'Raw metal, exposed wood, and visible structure. Built with a workshop edge.' },
  { key: 'bohemian', label: 'Bohemian', color: '#C0744A', desc: 'Layered textures, global patterns, and warm color. Collected over time, not all at once.' },
  { key: 'midcentury', label: 'Mid-Century Modern', color: '#5E7A6C', desc: 'Tapered legs, warm walnut, and gentle curves. Retro shapes that still feel current.' },
  { key: 'rustic', label: 'Rustic & Farmhouse', color: '#9C7B52', desc: 'Reclaimed wood, worn finishes, and handcrafted joints. Furniture with some history in it.' },
  { key: 'minimalist', label: 'Minimalist', color: '#F2EEE6', desc: 'Pared-back forms and quiet color. Pieces that earn their place in the room.' },
  { key: 'traditional', label: 'Traditional', color: '#5A352E', desc: 'Rich wood tones and classic silhouettes. Built to be passed down.' },
  { key: 'maximalist', label: 'Maximalist & Eclectic', color: '#CE9A33', desc: 'Bold color, mixed pattern, and fearless pairings. A room that tells a story all at once.' },
  { key: 'coastal', label: 'Coastal', color: '#A9C4CE', desc: 'Breezy, light, and relaxed. Pale woods, soft blues, and natural fibers.' },
  { key: 'japandi', label: 'Japandi', color: '#B7AC97', desc: 'Japanese restraint meets Scandinavian warmth. Low, quiet, and natural.' },
  { key: 'artdeco', label: 'Art Deco', color: '#2F4858', desc: 'Bold geometry, rich contrast, and metallic accents. Glamour with structure.' },
  { key: 'contemporary', label: 'Contemporary', color: '#8A8782', desc: 'Current, neutral, and uncluttered. Of-the-moment without chasing a single era.' },
];
const STARTER = {
  scandinavian: ['Pale Oak Lounge Chair', 'Light Birch Sideboard', 'Linen-Wrapped Sofa'],
  industrial: ['Blackened Steel Shelving', 'Reclaimed Pipe Table', 'Riveted Leather Stool'],
  bohemian: ['Rattan Peacock Chair', 'Patterned Kilim Pouf', 'Macrame Wall Hanging'],
  midcentury: ['Tapered-Leg Armchair', 'Walnut Credenza', 'Atomic-Era Pendant Lamp'],
  rustic: ['Reclaimed Plank Table', 'Wrought-Iron Floor Lamp', 'Slipcovered Sofa'],
  minimalist: ['Bare Oak Bench', 'Concrete Stool', 'Unadorned White Cabinet'],
  traditional: ['Tufted Wingback Chair', 'Carved Mahogany Bookcase', 'Damask Ottoman'],
  maximalist: ['Velvet Jewel-Tone Sofa', 'Mixed-Pattern Armchair', 'Gallery Wall Console'],
};
function starterPieces(prefix, keys) {
  let pieces = [], n = 1;
  keys.forEach((k) => (STARTER[k] || []).forEach((name) => { pieces.push({ id: `${prefix}${String(n).padStart(2, '0')}`, name, imageUrl: '', tags: [k] }); n++; }));
  return pieces;
}
const LIVING_TAGS = ['scandinavian', 'industrial', 'bohemian', 'midcentury', 'rustic', 'minimalist', 'traditional', 'maximalist'];
const DEFAULT_STATE = {
  version: 3,
  // baked-in hosted source: every visitor auto-loads these rooms, no admin setup needed.
  // Shares the same catalog as the swipe quiz (index.html).
  manifestUrl: 'https://nuninhosousa25.github.io/Furniture_style/manifest.json',
  destinationEmail: '',
  businessName: 'our team',
  categories: DEFAULT_CATEGORIES,
  quizzes: [{ id: 'q-living', name: 'Living Room', file: 'living-room.json', pieces: starterPieces('lr', LIVING_TAGS) }],
};
const STORAGE_KEY = 'furnitureStyleQuizState_v3';

/* ---------------- deep links ----------------
   ?room=<id|slug>  jumps a client straight into that room and hides the gear.
   ?dev=true        reveals the gear icon so you can open the admin area.
   nothing set      shows the normal room picker with no admin access.
   This hides admin from clients; it is not hard security (the admin area only
   edits a local browser copy and downloads files, it cannot change hosted content). */
const URL_PARAMS = new URLSearchParams(typeof window !== 'undefined' ? window.location.search : '');
const ROOM_PARAM = URL_PARAMS.get('room');
const DEV_MODE = URL_PARAMS.get('dev') === 'true';
function findQuizByParam(quizzes, param) {
  if (!param) return null;
  const p = param.trim().toLowerCase();
  return quizzes.find((q) => (q.id || '').toLowerCase() === p)
    || quizzes.find((q) => slug(q.name) === p)
    || null;
}

/* How the comparison quiz runs: the client plays ~TARGET_DUELS match-ups, and a
   "Stop & see my result" button appears once they pass MIN_DUELS. */
const TARGET_DUELS = 15;
const MIN_DUELS = 8;

/* ---------------- remote loading ---------------- */
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return res.json();
}
async function loadFromManifest(manifestUrl) {
  const m = await fetchJson(manifestUrl);
  const rooms = Array.isArray(m.rooms) ? m.rooms : [];
  if (!rooms.length) throw new Error('Manifest has no "rooms" array.');
  const quizzes = [];
  for (const r of rooms) {
    const fileUrl = new URL(r.file, manifestUrl).href;
    const rd = await fetchJson(fileUrl);
    quizzes.push({ id: r.id || ('q-' + slug(r.name)), name: r.name || rd.name || 'Quiz', file: r.file, pieces: Array.isArray(rd.pieces) ? rd.pieces : [] });
  }
  return {
    categories: Array.isArray(m.categories) && m.categories.length ? m.categories : DEFAULT_CATEGORIES,
    quizzes,
    businessName: m.businessName,
    destinationEmail: m.destinationEmail,
  };
}

/* ---------------- card ---------------- */
function CardFace({ card, catMap, forceFit }) {
  const cat = catMap[card.tags[0]] || { color: '#E4DCC9' };
  const text = cat.text || readableText(cat.color);
  const [imgFailed, setImgFailed] = useState(false);
  const [fit, setFit] = useState('cover');
  useEffect(() => { setImgFailed(false); setFit('cover'); }, [card.imageUrl]);
  const onImgLoad = (e) => { const { naturalWidth: w, naturalHeight: h } = e.target; setFit(w > h ? 'contain' : 'cover'); };
  const showImage = card.imageUrl && !imgFailed;
  return (
    <div className="absolute inset-0 rounded-3xl overflow-hidden shadow-xl" style={{ background: cat.color }}>
      {showImage ? (
        <img src={card.imageUrl} alt={card.name} draggable={false} className="w-full h-full select-none" style={{ objectFit: forceFit || fit, pointerEvents: 'none', WebkitUserDrag: 'none' }} onLoad={onImgLoad} onError={() => setImgFailed(true)} />
      ) : (
        <div className="w-full h-full flex flex-col items-center justify-center gap-3 px-8 text-center">
          <Icon name="image" size={48} strokeWidth={1.25} color={text} />
          <span className="font-mono" style={{ fontSize: '11px', color: text, opacity: 0.6 }}>NO PHOTO YET</span>
        </div>
      )}
      {card.name && (
        <div className="absolute bottom-0 left-0 right-0 px-4 py-3" style={{ background: showImage ? 'linear-gradient(to top, rgba(20,16,12,0.78), rgba(20,16,12,0))' : 'rgba(0,0,0,0.06)' }}>
          <p className="font-display text-lg leading-snug" style={{ color: showImage ? '#FBF6EE' : text }}>{card.name}</p>
        </div>
      )}
    </div>
  );
}

/* ---------------- duel (this or that) ---------------- */
function DuelView({ slotA, slotB, champId, round, minReq, busy, catMap, isDesktop, vw, vh, onPick, onSkip, onUndo, canUndo, onStop }) {
  const progress = Math.round((round / TARGET_DUELS) * 100);
  const canStop = round >= minReq;

  // equal-size frames so the two photos compare fairly; photos fill the frame (cover).
  let cardW, cardH, rowClass;
  if (isDesktop) {
    const avail = Math.min((vw || 1024) - 48, 1000);
    cardW = Math.min(460, Math.floor((avail - 28) / 2));
    cardH = Math.min(Math.round(cardW * 1.2), Math.round((vh || 800) * 0.62));
    rowClass = 'flex flex-row items-center justify-center gap-7';
  } else {
    cardW = Math.min(384, (vw || 384) - 32);
    cardH = Math.max(170, Math.min(Math.round(((vh || 800) - 300) / 2), Math.round(cardW * 0.9)));
    rowClass = 'flex flex-col items-center gap-3';
  }
  const cardStyle = { width: cardW + 'px', height: cardH + 'px', borderRadius: 24 };

  const renderCard = (piece, side) => {
    const isChamp = champId && piece.id === champId;
    const chosen = busy && busy.winnerId === piece.id;
    const dimmed = busy && busy.winnerId && busy.winnerId !== piece.id;
    return (
      <button onClick={() => { if (!busy) onPick(side); }} disabled={!!busy} aria-label={`Prefer ${piece.name || 'this one'}`}
        className="relative select-none focus:outline-none active:scale-95"
        style={{ ...cardStyle, transition: 'transform .2s ease, opacity .2s ease, box-shadow .2s ease', transform: chosen ? 'scale(1.03)' : 'scale(1)', opacity: dimmed ? 0.25 : 1, boxShadow: chosen ? '0 0 0 4px var(--brass)' : '0 0 0 0 rgba(0,0,0,0)', cursor: busy ? 'default' : 'pointer' }}>
        <CardFace card={piece} catMap={catMap} forceFit="cover" />
        {isChamp && <span className="absolute top-2 left-2 z-20 font-mono tracking-widest px-2 py-1 rounded-full" style={{ fontSize: '10px', background: 'var(--brass)', color: 'var(--ink)' }}>FAVOURITE</span>}
        {chosen && (
          <span className="absolute inset-0 z-20 flex items-center justify-center pointer-events-none">
            <span className="rounded-full p-3" style={{ background: 'var(--brass)' }}><Icon name="check" size={28} color="var(--ink)" /></span>
          </span>
        )}
      </button>
    );
  };

  return (
    <div className="w-full flex flex-col items-center mx-auto" style={{ maxWidth: isDesktop ? '1000px' : (cardW + 'px') }}>
      <div className="flex flex-col items-center gap-1 mb-3">
        <p className="font-display text-2xl">Which do you prefer?</p>
        <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>MATCH-UP {Math.min(round + 1, TARGET_DUELS)} / {TARGET_DUELS}</p>
      </div>
      <div className="w-full max-w-md h-1.5 rounded-full mb-5 overflow-hidden" style={{ background: 'rgba(43,37,32,0.12)' }}>
        <div className="h-full rounded-full transition-all duration-300" style={{ width: `${progress}%`, background: 'var(--brass)' }} />
      </div>
      <div className={rowClass}>
        {renderCard(slotA, 'A')}
        {isDesktop && <div className="font-display text-xl flex-shrink-0" style={{ opacity: 0.45 }}>vs</div>}
        {renderCard(slotB, 'B')}
      </div>
      <div className="flex items-center gap-3 mt-6">
        <button onClick={onUndo} disabled={!canUndo || !!busy} className="ghost-button disabled:opacity-30"><Icon name="undo" size={13} /> Undo</button>
        <button onClick={onSkip} disabled={!!busy} className="ghost-button disabled:opacity-40">No preference</button>
      </div>
      {canStop && (
        <button onClick={onStop} disabled={!!busy} className="tag-button mt-4 disabled:opacity-50"><Icon name="flag" size={14} color="var(--card)" /> Stop &amp; see my result ({round} done)</button>
      )}
      <p className="text-xs mt-4" style={{ opacity: 0.5 }}>Tap the room you like more. Your pick stays; the other is replaced.</p>
    </div>
  );
}

/* ---------------- results + share ---------------- */
function DuelResultsView({ wins, shown, history, catMap, quizName, destinationEmail, businessName, onRestart }) {
  const [clientName, setClientName] = useState('');
  const [copied, setCopied] = useState(false);

  const ranked = Object.keys(shown).map((k) => {
    const c = catMap[k] || { label: k, color: '#E4DCC9', desc: '' };
    const s = shown[k] || 0, w = wins[k] || 0;
    return { key: k, label: c.label || k, color: c.color || '#E4DCC9', text: c.text, desc: c.desc || '', wins: w, shown: s, rate: s ? w / s : 0 };
  }).sort((a, b) => (b.rate - a.rate) || (b.wins - a.wins));
  const top = ranked[0];
  const second = ranked[1];
  const showSecond = second && second.wins > 0 && (top.rate - second.rate) <= 0.2;
  const decided = history.filter((h) => !h.skipped).length;
  const skipped = history.length - decided;
  const pct = (r) => Math.round(r * 100) + '%';

  const buildSummary = () => {
    const lines = [`Style match-up result, ${quizName}`];
    if (clientName.trim()) lines.push(`From: ${clientName.trim()}`);
    lines.push(`Match-ups played: ${decided}${skipped ? ` (+${skipped} skipped)` : ''}`);
    if (top) lines.push(`Top style: ${top.label} (${pct(top.rate)}, won ${top.wins} of ${top.shown})`);
    if (showSecond) lines.push(`Also leans: ${second.label} (${pct(second.rate)})`);
    lines.push('', 'Style scores (win rate across match-ups, highest first):');
    ranked.forEach((s) => lines.push(`- ${s.label}: ${pct(s.rate)} (won ${s.wins} of ${s.shown})`));
    lines.push('', 'Match-ups, in order:');
    history.forEach((h, i) => {
      if (h.skipped) { lines.push(`${i + 1}. ${h.aName} vs ${h.bName} — no preference`); }
      else { const tags = (h.winnerTags || []).map((t) => catMap[t]?.label || t).join(', '); lines.push(`${i + 1}. ${h.aName} vs ${h.bName} — chose ${h.winnerName}${tags ? ` [${tags}]` : ''}`); }
    });
    return lines.join('\n');
  };
  const sendEmail = () => {
    const subject = `Style match-up result${clientName.trim() ? ` from ${clientName.trim()}` : ''}, ${quizName}`;
    window.location.href = `mailto:${encodeURIComponent(destinationEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(buildSummary())}`;
  };
  const nativeShare = async () => { try { await navigator.share({ title: `Style match-up result, ${quizName}`, text: buildSummary() }); } catch (e) {} };
  const copy = async () => { try { await navigator.clipboard.writeText(buildSummary()); setCopied(true); setTimeout(() => setCopied(false), 1800); } catch (e) {} };

  const shareRow = (
    <div className="w-full rounded-2xl p-4 flex flex-col gap-3" style={{ background: 'var(--card)' }}>
      <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>SEND THIS TO {(businessName || 'US').toUpperCase()}</p>
      <input value={clientName} onChange={(e) => setClientName(e.target.value)} placeholder="Your name (optional)" className="field" />
      <div className="flex flex-wrap gap-2">
        {destinationEmail && <button onClick={sendEmail} className="tag-button"><Icon name="send" size={15} color="var(--card)" /> Send to us</button>}
        {typeof navigator !== 'undefined' && navigator.share && <button onClick={nativeShare} className="ghost-button"><Icon name="upload" size={14} /> Share</button>}
        <button onClick={copy} className="ghost-button"><Icon name="copy" size={14} /> {copied ? 'Copied' : 'Copy result'}</button>
      </div>
      {!destinationEmail && <p className="text-xs" style={{ opacity: 0.55 }}>Tip: set your email under Manage so a "Send to us" button appears here.</p>}
      <p className="text-xs" style={{ opacity: 0.55 }}>The message includes every match-up and the full style breakdown, so the team can read your taste in detail.</p>
    </div>
  );

  if (!top || top.wins === 0) {
    return (
      <div className="w-full max-w-xs flex flex-col items-center text-center gap-6">
        <div className="flex flex-col items-center gap-3">
          <p className="font-display text-2xl">Nothing quite landed</p>
          <p className="text-sm" style={{ opacity: 0.75 }}>That's useful too. Send this to {businessName} and we'll start from scratch with you.</p>
          <button onClick={onRestart} className="ghost-button mt-1"><Icon name="rotate" size={14} /> Try again</button>
        </div>
        {shareRow}
      </div>
    );
  }
  return (
    <div className="w-full max-w-xs flex flex-col items-center gap-6">
      <div className="text-center">
        <p className="font-mono text-xs tracking-widest mb-2" style={{ opacity: 0.6 }}>YOUR STYLE PROFILE, {quizName.toUpperCase()}</p>
        <p className="font-display text-3xl">{top.label}</p>
      </div>

        <p className="mt-6 text-sm leading-relaxed">{top.desc}</p>

/* ---------------- small inputs ---------------- */
function BlurInput({ value, onCommit, placeholder, type }) {
  const [v, setV] = useState(value || '');
  useEffect(() => { setV(value || ''); }, [value]);
  return <input type={type || 'text'} value={v} onChange={(e) => setV(e.target.value)} onBlur={() => onCommit(v)} placeholder={placeholder} className="field" />;
}
function Section({ label, children }) {
  return (
    <div className="rounded-2xl p-4 flex flex-col gap-3" style={{ background: 'var(--card)' }}>
      <p className="font-mono text-xs tracking-widest" style={{ opacity: 0.6 }}>{label}</p>
      {children}
    </div>
  );
}

/* ---------------- app ---------------- */
function App() {
  const [state, setState] = useState(null);
  const [view, setView] = useState('picker');
  const [activeQuizId, setActiveQuizId] = useState(null);
  const [runQuiz, setRunQuiz] = useState(null);
  const [duel, setDuel] = useState(null);
  const [busy, setBusy] = useState(null);
  const [error, setError] = useState(null);
  const [remote, setRemote] = useState({ loading: false, error: null });
  const [vp, setVp] = useState(() => ({ w: typeof window !== 'undefined' ? window.innerWidth : 1024, h: typeof window !== 'undefined' ? window.innerHeight : 768 }));
  const didInit = useRef(false);

  const persist = (next) => {
    setState(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); setError(null); }
    catch (e) { setError('Could not cache locally. Edits may be lost on reload.'); }
  };

  const applyRemote = (base, data) => {
    const next = {
      ...base,
      categories: data.categories,
      quizzes: data.quizzes,
      businessName: data.businessName != null ? data.businessName : base.businessName,
      destinationEmail: data.destinationEmail != null ? data.destinationEmail : base.destinationEmail,
    };
    persist(next);
    setActiveQuizId(next.quizzes[0] ? next.quizzes[0].id : null);
    return next;
  };

  const doLoadRemote = async (url) => {
    setRemote({ loading: true, error: null });
    try {
      const data = await loadFromManifest(url);
      const base = (state || DEFAULT_STATE);
      applyRemote({ ...base, manifestUrl: url }, data);
      setRemote({ loading: false, error: null });
      setView('picker');
    } catch (e) {
      setRemote({ loading: false, error: `Could not load: ${e.message}. Check the URL and CORS settings.` });
    }
  };

  // pick a challenger: prefer a different primary style than the champion, and never the piece we just removed
  const pickChallenger = (pieces, champion, avoidId) => {
    const pool = pieces.filter((p) => p.id !== champion.id && p.id !== avoidId);
    const src0 = pool.length ? pool : pieces.filter((p) => p.id !== champion.id);
    if (!src0.length) return champion;
    const champStyle = champion.tags[0] || '';
    const diff = src0.filter((p) => (p.tags[0] || '') !== champStyle);
    const src = diff.length ? diff : src0;
    return src[Math.floor(Math.random() * src.length)];
  };

  const beginDuel = (q) => {
    const pieces = shuffle(q.pieces);
    setRunQuiz({ ...q, pieces });
    setBusy(null);
    if (pieces.length < 2) {
      setDuel({ slotA: null, slotB: null, champId: null, round: 0, wins: {}, shown: {}, history: [], snaps: [] });
      setView('results');
      return;
    }
    const a = pieces[0];
    const b = pickChallenger(pieces, a, a.id);
    setDuel({ slotA: a, slotB: b, champId: null, round: 0, wins: {}, shown: {}, history: [], snaps: [] });
    setView('quiz');
  };

  const onPick = (side) => {
    if (busy || !duel || !duel.slotA) return;
    const d = duel;
    const winner = side === 'A' ? d.slotA : d.slotB;
    const loser = side === 'A' ? d.slotB : d.slotA;
    setBusy({ winnerId: winner.id });
    setTimeout(() => {
      const wins = { ...d.wins }, shown = { ...d.shown };
      winner.tags.forEach((t) => { wins[t] = (wins[t] || 0) + 1; shown[t] = (shown[t] || 0) + 1; });
      loser.tags.forEach((t) => { shown[t] = (shown[t] || 0) + 1; });
      const snap = { slotA: d.slotA, slotB: d.slotB, champId: d.champId, round: d.round, wins: d.wins, shown: d.shown, histLen: d.history.length };
      const history = [...d.history, { aName: d.slotA.name || 'Untitled', bName: d.slotB.name || 'Untitled', winnerId: winner.id, winnerName: winner.name || 'Untitled', winnerTags: [...winner.tags], skipped: false }];
      const newRound = d.round + 1;
      const ended = newRound >= TARGET_DUELS;
      let slotA = d.slotA, slotB = d.slotB;
      if (!ended) {
        const nextChal = pickChallenger(runQuiz.pieces, winner, loser.id);
        slotA = side === 'A' ? winner : nextChal;
        slotB = side === 'B' ? winner : nextChal;
      }
      setDuel({ slotA, slotB, champId: winner.id, round: newRound, wins, shown, history, snaps: [...d.snaps, snap] });
      setBusy(null);
      if (ended) setView('results');
    }, 260);
  };

  const onSkip = () => {
    if (busy || !duel || !duel.slotA) return;
    const d = duel;
    setBusy({ winnerId: null });
    setTimeout(() => {
      const snap = { slotA: d.slotA, slotB: d.slotB, champId: d.champId, round: d.round, wins: d.wins, shown: d.shown, histLen: d.history.length };
      const history = [...d.history, { aName: d.slotA.name || 'Untitled', bName: d.slotB.name || 'Untitled', winnerId: null, skipped: true }];
      const newRound = d.round + 1;
      const ended = newRound >= TARGET_DUELS;
      let slotA = d.slotA, slotB = d.slotB;
      if (!ended) {
        // keep the reigning favourite, swap the challenger (the non-champion slot)
        const champOnA = d.champId && d.slotA.id === d.champId;
        const champOnB = d.champId && d.slotB.id === d.champId;
        const champ = champOnB ? d.slotB : d.slotA;
        const replacing = champOnA ? d.slotB : (champOnB ? d.slotA : d.slotB);
        const nextChal = pickChallenger(runQuiz.pieces, champ, replacing.id);
        if (champOnB) slotA = nextChal; else slotB = nextChal;
      }
      setDuel({ ...d, slotA, slotB, round: newRound, history, snaps: [...d.snaps, snap] });
      setBusy(null);
      if (ended) setView('results');
    }, 200);
  };

  const onUndoDuel = () => {
    if (busy || !duel || !duel.snaps.length) return;
    const snap = duel.snaps[duel.snaps.length - 1];
    setDuel({ slotA: snap.slotA, slotB: snap.slotB, champId: snap.champId, round: snap.round, wins: snap.wins, shown: snap.shown, history: duel.history.slice(0, snap.histLen), snaps: duel.snaps.slice(0, -1) });
  };
  const onStopDuel = () => { if (!busy) setView('results'); };

  useEffect(() => {
    if (didInit.current) return; didInit.current = true;
    let s = DEFAULT_STATE;
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) { const p = JSON.parse(stored); if (p && p.version === 3 && Array.isArray(p.quizzes) && p.quizzes.length) s = p; }
    } catch (e) {}
    setState(s);
    setActiveQuizId(s.quizzes[0].id);
    const autoStart = (quizzes) => { const q = findQuizByParam(quizzes, ROOM_PARAM); if (q) beginDuel(q); };
    if (s.manifestUrl) {
      (async () => {
        setRemote({ loading: true, error: null });
        try { const data = await loadFromManifest(s.manifestUrl); const next = applyRemote(s, data); setRemote({ loading: false, error: null }); autoStart(next.quizzes); }
        catch (e) { setRemote({ loading: false, error: `Using cached copy. Live load failed: ${e.message}` }); autoStart(s.quizzes); }
      })();
    } else {
      autoStart(s.quizzes);
    }
  }, []);

  useEffect(() => {
    const onResize = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const catMap = state ? Object.fromEntries(state.categories.map((c) => [c.key, c])) : {};

  const updateQuiz = (qid, fn) => persist({ ...state, quizzes: state.quizzes.map((q) => q.id === qid ? fn(q) : q) });
  const onAddPiece = (qid, piece) => updateQuiz(qid, (q) => ({ ...q, pieces: [...q.pieces, piece] }));
  const onDeletePiece = (qid, pid) => updateQuiz(qid, (q) => ({ ...q, pieces: q.pieces.filter((p) => p.id !== pid) }));
  const onUpdatePiece = (qid, pid, patch) => updateQuiz(qid, (q) => ({ ...q, pieces: q.pieces.map((p) => p.id === pid ? { ...p, ...patch } : p) }));
  const onTogglePieceTag = (qid, pid, key) => updateQuiz(qid, (q) => ({ ...q, pieces: q.pieces.map((p) => p.id === pid ? { ...p, tags: p.tags.includes(key) ? p.tags.filter((t) => t !== key) : [...p.tags, key] } : p) }));
  const onAddQuiz = (name) => { const id = `q-${Date.now()}`; persist({ ...state, quizzes: [...state.quizzes, { id, name, file: `${slug(name)}.json`, pieces: [] }] }); setActiveQuizId(id); };
  const onRenameQuiz = (qid, name) => updateQuiz(qid, (q) => ({ ...q, name, file: q.file || `${slug(name)}.json` }));
  const onDeleteQuiz = (qid) => { const rest = state.quizzes.filter((q) => q.id !== qid); persist({ ...state, quizzes: rest }); if (activeQuizId === qid) setActiveQuizId(rest[0].id); };
  const onAddCategory = (cat) => persist({ ...state, categories: [...state.categories, cat] });
  const onDeleteCategory = (key) => persist({ ...state, categories: state.categories.filter((c) => c.key !== key), quizzes: state.quizzes.map((q) => ({ ...q, pieces: q.pieces.map((p) => ({ ...p, tags: p.tags.filter((t) => t !== key) })) })) });
  const onSet = (patch) => persist({ ...state, ...patch });

  const onImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const p = JSON.parse(ev.target.result);
        if (p && p.version === 3 && Array.isArray(p.quizzes) && p.quizzes.length && Array.isArray(p.categories)) { persist(p); setActiveQuizId(p.quizzes[0].id); }
        else setError('That file does not look like a full config export.');
      } catch (err) { setError('Could not read that file.'); }
    };
    reader.readAsText(file); e.target.value = '';
  };
  const onResetAll = () => { if (confirm('Reset everything to the starter setup? This clears the hosted source link too.')) { persist(DEFAULT_STATE); setActiveQuizId(DEFAULT_STATE.quizzes[0].id); setRemote({ loading: false, error: null }); } };

  if (!state) return <div style={{ minHeight: '100vh', background: '#EAE2D3' }} />;
  const isDesktop = vp.w >= 768;

  return (
    <div className="min-h-screen w-full flex flex-col items-center px-4 py-6 relative" style={{ '--canvas': '#EAE2D3', '--ink': '#2B2520', '--card': '#FBF8F2', '--sage': '#6E7F5C', '--rust': '#B2603F', '--brass': '#C9A227', background: 'var(--canvas)', color: 'var(--ink)', fontFamily: "'Work Sans', sans-serif" }}>
      {(!isDesktop || view === 'admin') ? (
        <div className="w-full max-w-md flex items-center justify-between mb-6">
          <div className="flex items-center gap-2">
            <div className="w-4 h-4 rounded" style={{ background: 'var(--brass)' }} />
            <span className="font-display text-lg">This or That</span>
          </div>
          {view === 'admin'
            ? <button onClick={() => setView('picker')} className="p-2 rounded-lg" style={{ background: 'var(--card)' }} aria-label="Back"><Icon name="arrow-left" size={16} /></button>
            : DEV_MODE
              ? <button onClick={() => setView('admin')} className="p-2 rounded-lg" style={{ background: 'var(--card)' }} aria-label="Manage"><Icon name="settings" size={16} /></button>
              : null}
        </div>
      ) : (
        // desktop client view: hide the header for more room; float the gear for dev only
        DEV_MODE
          ? <button onClick={() => setView('admin')} className="absolute top-4 right-4 p-2 rounded-lg z-10" style={{ background: 'var(--card)' }} aria-label="Manage"><Icon name="settings" size={16} /></button>
          : null
      )}

      {view === 'picker' ? (
        remote.loading ? (
          <p className="font-mono text-sm mt-10" style={{ opacity: 0.6 }}>Loading rooms from your hosted source...</p>
        ) : state.quizzes.length === 1 ? (
          <div className="w-full max-w-xs flex flex-col items-center text-center gap-5 mt-6">
            <p className="font-display text-4xl leading-tight">This<br />or that?</p>
            <p className="text-sm" style={{ opacity: 0.75 }}>Two rooms at a time, one question: which do you prefer? Your pick stays and faces a new challenger. Keep choosing and we'll find your style.</p>
            <button onClick={() => beginDuel(state.quizzes[0])} disabled={state.quizzes[0].pieces.length < 2} className="tag-button mt-2 disabled:opacity-40">Begin</button>
          </div>
        ) : <PickerView quizzes={state.quizzes} onPick={beginDuel} />
      ) : view === 'quiz' && duel && duel.slotA ? (
        <DuelView slotA={duel.slotA} slotB={duel.slotB} champId={duel.champId} round={duel.round} minReq={MIN_DUELS} busy={busy} catMap={catMap} isDesktop={isDesktop} vw={vp.w} vh={vp.h} onPick={onPick} onSkip={onSkip} onUndo={onUndoDuel} canUndo={duel.snaps.length > 0} onStop={onStopDuel} />
      ) : view === 'results' ? (
        <DuelResultsView wins={duel ? duel.wins : {}} shown={duel ? duel.shown : {}} history={duel ? duel.history : []} catMap={catMap} quizName={runQuiz ? runQuiz.name : 'Room'} destinationEmail={state.destinationEmail} businessName={state.businessName || 'our team'} onRestart={() => setView('picker')} />
      ) : (
        <AdminView state={state} activeQuizId={activeQuizId} setActiveQuizId={setActiveQuizId} remote={remote} onLoadRemote={doLoadRemote}
          onAddPiece={onAddPiece} onTogglePieceTag={onTogglePieceTag} onDeletePiece={onDeletePiece} onUpdatePiece={onUpdatePiece}
          onAddQuiz={onAddQuiz} onRenameQuiz={onRenameQuiz} onDeleteQuiz={onDeleteQuiz}
          onAddCategory={onAddCategory} onDeleteCategory={onDeleteCategory}
          onSet={onSet} onImport={onImport} onReset={onResetAll} error={error} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // Compile the app source with the classic JSX runtime (React.createElement),
  // then run it as a normal global script. This is independent of which
  // @babel/standalone version the CDN serves.
  (function () {
    try {
      if (typeof Babel === 'undefined' || typeof React === 'undefined') {
        throw new Error('Could not load React/Babel from the CDN. Check your internet connection.');
      }
      var src = document.getElementById('app-source').textContent;
      var compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
      var s = document.createElement('script');
      s.textContent = compiled;
      document.body.appendChild(s);
    } catch (err) {
      document.getElementById('root').innerHTML =
        '<div style="max-width:28rem;margin:4rem auto;padding:0 1rem;font-family:sans-serif;color:#2B2520;text-align:center">' +
        '<p style="font-size:1.25rem;margin-bottom:.5rem">Could not start the quiz</p>' +
        '<p style="font-size:.875rem;opacity:.7">' + (err && err.message ? err.message : err) + '</p></div>';
      throw err;
    }
  })();
</script>
</body>
